<!doctype html>

  <style>
    :root{--bg:#f6f7f3;--card:#fff;--soft:#eef5f1;--ink:#18211f;--muted:#65706c;--line:#dce3dd;--green:#0f5f46;--coral:#e56b4f;--shadow:0 18px 55px rgba(35,47,43,.12);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}a{color:var(--green);text-decoration:none}button,input{font:inherit}button{cursor:pointer}.shell{display:grid;grid-template-columns:230px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:20px 14px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:22px}.brand{display:flex;gap:12px;align-items:center}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:8px;background:var(--soft);border:1px solid var(--line);font-weight:800;color:var(--green)}.brand small{display:block;color:var(--muted);margin-top:2px}.nav{display:grid;gap:8px}.nav button,.btn,.chip,.chapter{border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}.nav button{padding:12px;text-align:left}.nav button.active,.chip.active,.chapter.active{background:var(--soft);border-color:rgba(15,95,70,.45);color:var(--green);font-weight:700}.links{margin-top:auto;display:grid;gap:10px;font-size:14px}.top{position:sticky;top:0;z-index:2;padding:14px 26px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(16px)}.search{display:flex;gap:10px;align-items:center;max-width:760px;padding:0 14px;border:1px solid var(--line);border-radius:8px;background:var(--card)}.search span{font-size:13px;color:var(--muted)}.search input{height:42px;flex:1;border:0;outline:0;background:transparent;color:var(--ink)}.view{display:none;padding:28px}.view.show{display:block}.hero{min-height:calc(100vh - 190px);display:grid;grid-template-columns:minmax(0,.95fr) minmax(300px,1.05fr);gap:30px;align-items:center}.eyebrow{margin:0 0 10px;color:var(--coral);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0}h1,h2,h3{margin:0;letter-spacing:0}h1{font-size:clamp(42px,7vw,80px);line-height:1.02}h2{font-size:28px}.hero p{font-size:18px;line-height:1.8;color:var(--muted);max-width:620px}.actions,.filters,.tags{display:flex;flex-wrap:wrap;gap:10px}.btn{min-height:42px;padding:0 16px;font-weight:700}.btn.primary{background:var(--green);border-color:var(--green);color:#fff}.hero-img{overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--card);box-shadow:var(--shadow)}.hero-img img{display:block;width:100%;height:min(58vh,510px);object-fit:cover}.metrics,.paths,.grid{display:grid;gap:12px}.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}.metric,.path,.tile,.reader,.toc{border:1px solid var(--line);border-radius:8px;background:var(--card)}.metric,.path,.tile{padding:18px}.metric b{display:block;color:var(--green);font-size:32px}.metric span,.path p,.tile p,.chapter small{color:var(--muted);line-height:1.65}.section{margin-top:42px}.paths{grid-template-columns:repeat(5,minmax(0,1fr))}.tag{display:inline-flex;padding:4px 8px;border-radius:999px;background:var(--soft);color:var(--green);font-size:12px}.reader-wrap{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start}.toc{position:sticky;top:86px;max-height:calc(100vh - 112px);overflow:auto;padding:14px}.chapter{width:100%;padding:13px;text-align:left;margin-bottom:9px}.reader{overflow:hidden;min-height:calc(100vh - 112px)}.reader-head{display:flex;justify-content:space-between;gap:18px;padding:22px;border-bottom:1px solid var(--line)}.md{padding:28px;line-height:1.82;overflow-wrap:anywhere}.md h1{font-size:34px;line-height:1.18}.md h2{margin-top:34px;padding-top:12px;border-top:1px solid var(--line)}.md h3{margin-top:24px}.md pre{overflow:auto;padding:16px;border-radius:8px;background:#111713;color:#edf8f1}.md code{padding:2px 5px;border-radius:5px;background:var(--soft)}.md pre code{padding:0;background:transparent}.md blockquote{margin-left:0;padding-left:16px;border-left:4px solid var(--green);color:var(--muted)}.md img{max-width:100%;border:1px solid var(--line);border-radius:8px}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.tile{display:flex;flex-direction:column;gap:10px;min-height:170px}.chip{min-height:36px;padding:0 12px}@media(max-width:1000px){.shell{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;align-items:center;overflow:auto}.nav{display:flex}.links{display:none}.hero,.reader-wrap{grid-template-columns:1fr}.paths,.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.toc{position:static;max-height:none}}@media(max-width:680px){.top,.view{padding:16px}.search span,.brand small{display:none}.hero{min-height:auto}.hero-img img{height:240px}.metrics,.paths,.grid{grid-template-columns:1fr}h1{font-size:42px}}
  </style>

<body>
  <div class="shell">
    <aside class="side"><div class="brand"><span class="logo">HA</span><div><b>Hello-Agents</b><small>Agent 学习路线</small></div></div><nav class="nav"><button class="active" data-view="home">总览</button><button data-view="reader">章节</button><button data-view="extras">专题</button><button data-view="projects">项目</button></nav><div class="links"><a href="https://github.com/datawhalechina/hello-agents" target="_blank">原仓库</a><a href="https://datawhalechina.github.io/hello-agents/" target="_blank">官方阅读</a></div></aside>
    <main><header class="top"><label class="search"><span>搜索</span><input id="q" placeholder="章节、主题、项目、关键词" /></label></header>
      <section id="home" class="view show"><div class="hero"><div><p class="eyebrow">Datawhale 开源教程</p><h1>从零开始构建智能体</h1><p>把 Hello-Agents 的课程、代码案例、拓展文章和社区项目整理成一个可搜索、可阅读、可规划的学习界面。</p><div class="actions"><button class="btn primary" data-open="chapter1">开始第一章</button><button class="btn" data-view="projects">看共创项目</button></div></div><div class="hero-img"><img alt="Hello-Agents" src="https://raw.githubusercontent.com/datawhalechina/hello-agents/main/docs/images/hello-agents.png"></div></div><div class="metrics"><div class="metric"><b>16</b><span>主线章节</span></div><div class="metric"><b>5</b><span>学习阶段</span></div><div class="metric"><b>13+</b><span>拓展专题</span></div><div class="metric"><b>40+</b><span>社区项目</span></div></div><div class="section"><p class="eyebrow">Learning Path</p><h2>五阶段学习路线</h2><div id="paths" class="paths"></div></div></section>
      <section id="reader" class="view"><div class="reader-wrap"><aside class="toc"><p class="eyebrow">Chapters</p><div id="chapterList"></div></aside><article class="reader"><div class="reader-head"><div><p id="part" class="eyebrow"></p><h2 id="title">选择一个章节</h2></div><a id="source" target="_blank">查看源码</a></div><div id="md" class="md">请选择左侧章节。</div></article></div></section>
      <section id="extras" class="view"><p class="eyebrow">Extra Chapters</p><h2>拓展专题</h2><div id="extraGrid" class="grid section"></div></section>
      <section id="projects" class="view"><p class="eyebrow">Community Projects</p><h2>共创毕业设计项目</h2><div class="filters section"><button class="chip active" data-filter="全部">全部</button><button class="chip" data-filter="数据分析">数据分析</button><button class="chip" data-filter="编程">编程</button><button class="chip" data-filter="生活服务">生活服务</button><button class="chip" data-filter="运维">运维</button><button class="chip" data-filter="内容创作">内容创作</button></div><div id="projectGrid" class="grid"></div></section>
    </main>
  </div>
<script>
const raw="https://raw.githubusercontent.com/datawhalechina/hello-agents/main/", repo="https://github.com/datawhalechina/hello-agents/blob/main/";
const parts=[['foundation','第一部分','智能体与语言模型基础','从智能体概念、发展历史到大语言模型基础。','第 1-3 章'],['build','第二部分','构建大语言模型智能体','实现经典范式，体验低代码平台和主流框架。','第 4-7 章'],['advanced','第三部分','高级知识扩展','深入记忆、检索、上下文工程、协议、训练和评估。','第 8-12 章'],['cases','第四部分','综合案例进阶','旅行助手、DeepResearch、赛博小镇等真实案例。','第 13-15 章'],['capstone','第五部分','毕业设计及未来展望','构建完整多智能体应用。','第 16 章']].map(([id,name,title,summary,range])=>({id,name,title,summary,range}));
const chapters=[['preface','前言','项目缘起、学习建议和背景说明','foundation','docs/前言.md'],['chapter1','第一章 初识智能体','智能体定义、类型、范式与应用','foundation','docs/chapter1/第一章 初识智能体.md'],['chapter2','第二章 智能体发展史','从符号主义到 LLM 驱动的智能体演进','foundation','docs/chapter2/第二章 智能体发展史.md'],['chapter3','第三章 大语言模型基础','Transformer、提示、主流 LLM 及其局限','foundation','docs/chapter3/第三章 大语言模型基础.md'],['chapter4','第四章 智能体经典范式构建','ReAct、Plan-and-Solve、Reflection','build','docs/chapter4/第四章 智能体经典范式构建.md'],['chapter5','第五章 基于低代码平台的智能体搭建','Coze、Dify、n8n 等平台','build','docs/chapter5/第五章 基于低代码平台的智能体搭建.md'],['chapter6','第六章 框架开发实践','AutoGen、AgentScope、LangGraph','build','docs/chapter6/第六章 框架开发实践.md'],['chapter7','第七章 构建你的 Agent 框架','从 0 开始构建智能体框架','build','docs/chapter7/第七章 构建你的Agent框架.md'],['chapter8','第八章 记忆与检索','记忆系统、RAG 与存储','advanced','docs/chapter8/第八章 记忆与检索.md'],['chapter9','第九章 上下文工程','持续交互中的情境理解','advanced','docs/chapter9/第九章 上下文工程.md'],['chapter10','第十章 智能体通信协议','MCP、A2A、ANP 等协议解析','advanced','docs/chapter10/第十章 智能体通信协议.md'],['chapter11','第十一章 Agentic-RL','从 SFT 到 GRPO 的训练实战','advanced','docs/chapter11/第十一章 Agentic-RL.md'],['chapter12','第十二章 智能体性能评估','指标、基准测试与评估框架','advanced','docs/chapter12/第十二章 智能体性能评估.md'],['chapter13','第十三章 智能旅行助手','MCP 与多智能体协作应用','cases','docs/chapter13/第十三章 智能旅行助手.md'],['chapter14','第十四章 自动化深度研究智能体','DeepResearch Agent 复现与解析','cases','docs/chapter14/第十四章 自动化深度研究智能体.md'],['chapter15','第十五章 构建赛博小镇','Agent 与游戏结合','cases','docs/chapter15/第十五章 构建赛博小镇.md'],['chapter16','第十六章 毕业设计','完整多智能体应用','capstone','docs/chapter16/第十六章 毕业设计.md']].map(([id,title,summary,part,path])=>({id,title,summary,part,path}));
const extras=[['Extra01-面试问题总结.md','Agent 面试题总结','面向求职准备的问题清单',['面试']],['Extra01-参考答案.md','Agent 面试参考答案','配套答案和知识点梳理',['答案']],['Extra02-上下文工程补充知识.md','上下文工程补充','上下文工程方法和实践经验',['Context']],['Extra03-Dify智能体创建保姆级操作流程.md','Dify 智能体创建流程','低代码平台上手流程',['Dify']],['Extra04-DatawhaleFAQ.md','课程常见问题','学习过程中的常见疑问',['FAQ']],['Extra05-AgentSkills解读.md','Agent Skills 解读','Agent Skills 与 MCP 对比',['Skills']],['Extra06-GUIAgent科普与实战.md','GUI Agent 科普与实战','GUI Agent 原理与实践',['GUI']],['Extra07-环境配置.md','环境配置','本地学习环境准备',['环境']],['Extra08-如何写出好的Skill.md','如何写出好的 Skill','Skill 写作实践建议',['Skills']],['Extra09-Agent应用开发实践踩坑与经验分享.md','Agent 开发踩坑经验','工程经验总结',['工程']],['Extra10-Agent自进化.md','Agent 自进化','自进化闭环梳理',['进阶']],['Extra11-WebAgent科普与实战.md','WebAgent 科普与实战','Web Agent 原理和集成',['WebAgent']],['Extra12-旅行助手后训练实战.md','旅行助手后训练实战','把 Demo 打磨成 Planner',['训练']],['Extra13-Hello-Agents视频课录制共创.md','视频课录制共创','视频课程共创资源',['视频']]].map(([file,title,summary,tags])=>({file,title,summary,tags,path:'Extra-Chapter/'+file}));
const names=['1zrj-DataAnalysisAgent','939147533-DatabaseAgent','alexrunner-DataAnalysisAgent','allen2000-FashionDailyDress','angelen-SoftwareDevHelper','AstrumPush-Smart-Recipe-Agent','bichchibui5-hub-EmailSmartAssistant','CC1227871-StockInsightAgent','chen070808-ProgrammingTutor','czxgg0630-ProductAnalysisAgent','healer-666-Academic-Data-Agent','jack6249-GiftGeniusAgent','JJason-DeepCastAgent','jjyaoao-CodeReviewAgent','Johnx-w-EmailDigestAgent','kkkano-FinReportAgent','lcyting-StockSage-agent','lgs-only-NovelGenerator','monkeyhlj-NetworkHealthReportAgent','pamdla-MindEchoAgent','Shawnxyxy-HealthRecordAgent','tino-chen-HelloClaw','usernamedadad-AutoFlow','xujikai-SentenceExpandAgent','yangyousan123-CodePlanAgent','Yixiang-Wu-LearningAgent','YYHDBL-HelloCodeAgentCli','zjzhou-SREOnCallAgent','zzuu222-LanlearnAgent'];
let state={view:'home',q:'',filter:'全部',doc:null}; const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)], enc=p=>p.split('/').map(encodeURIComponent).join('/'), rawUrl=p=>raw+enc(p), repoUrl=p=>repo+enc(p);
function cat(n){let l=n.toLowerCase();if(/data|database|stock|fin|product|report/.test(l))return'数据分析';if(/code|program|software|tutor|plan/.test(l))return'编程';if(/sre|network|ops|oncall|healthreport/.test(l))return'运维';if(/novel|column|story|history|digest|aistory/.test(l))return'内容创作';return'生活服务'}
const projects=names.map(name=>({name,category:cat(name),summary:name.replace(/^[^-]+-/,'').replace(/[-_]/g,' ')+'：社区共创 Agent 项目。',url:repoUrl('Co-creation-projects/'+name)}));
function show(v){state.view=v;$$('.view').forEach(x=>x.classList.toggle('show',x.id===v));$$('[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view===v&&x.parentElement.className==='nav'))}
function filt(arr){return state.q?arr.filter(x=>JSON.stringify(x).toLowerCase().includes(state.q)):arr}
function chBtn(c){let p=parts.find(x=>x.id===c.part);return `<button class="chapter ${state.doc?.id===c.id?'active':''}" data-ch="${c.id}"><b>${c.title}</b><small>${p?.title||''} · ${c.summary}</small></button>`}
function render(){ $('#paths').innerHTML=parts.map(p=>`<article class="path"><b>${p.name}</b><h3>${p.title}</h3><p>${p.summary}</p><span class="tag">${p.range}</span></article>`).join(''); renderChapters(); renderExtras(); renderProjects(); }
function renderChapters(){ $('#chapterList').innerHTML=filt(chapters).map(chBtn).join(''); $$('#chapterList .chapter').forEach(b=>b.onclick=()=>openDoc(chapters.find(c=>c.id===b.dataset.ch))) }
function renderExtras(){ $('#extraGrid').innerHTML=filt(extras).map(e=>`<article class="tile"><h3>${e.title}</h3><p>${e.summary}</p><div class="tags">${e.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><a href="#" data-extra="${e.file}">阅读专题</a></article>`).join(''); $$('[data-extra]').forEach(a=>a.onclick=e=>{e.preventDefault();let it=extras.find(x=>x.file===a.dataset.extra);show('reader');openDoc({...it,id:it.file,part:'advanced',title:it.title})}) }
function renderProjects(){ let list=filt(projects).filter(p=>state.filter==='全部'||p.category===state.filter); $('#projectGrid').innerHTML=list.map(p=>`<article class="tile"><h3>${p.name}</h3><p>${p.summary}</p><div><span class="tag">${p.category}</span></div><a href="${p.url}" target="_blank">打开项目</a></article>`).join('') }
function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function local(u,b){if(/^(https?:|mailto:|#)/i.test(u))return u;let p=b.split('/');p.pop();let out=[];p.concat(u.split('/')).forEach(x=>{if(!x||x==='.')return;if(x==='..')out.pop();else out.push(x)});return rawUrl(out.join('/'))}
function md(s,path){let h=esc(s).replace(/\r\n/g,'\n').replace(/```([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>').replace(/!\[([^\]]*)\]\(([^)]+)\)/g,(_,a,u)=>`<img alt="${a}" src="${local(u,path)}">`).replace(/\[([^\]]+)\]\(([^)]+)\)/g,(_,t,u)=>`<a target="_blank" href="${/\.md(#.*)?$/.test(u)?repoUrl(local(u,path).replace(raw,'')):local(u,path)}">${t}</a>`).replace(/^&gt; (.*)$/gm,'<blockquote>$1</blockquote>').replace(/^\s*[-*] (.*)$/gm,'<li>$1</li>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');return h.split(/\n{2,}/).map(b=>{b=b.trim();if(!b)return'';if(/^<(h\d|pre|blockquote|img|li)/.test(b))return /^<li/.test(b)?`<ul>${b}</ul>`:b;return `<p>${b.replace(/\n/g,'<br>')}</p>`}).join('\n')}
async function openDoc(d){state.doc=d;renderChapters();let p=parts.find(x=>x.id===d.part);$('#part').textContent=p?.title||'专题阅读';$('#title').textContent=d.title;$('#source').href=repoUrl(d.path);$('#md').textContent='正在加载...';try{let r=await fetch(rawUrl(d.path));if(!r.ok)throw 0;$('#md').innerHTML=md(await r.text(),d.path)}catch(e){$('#md').innerHTML='<p>文档加载失败。可以点“查看源码”打开原文。</p>'}}
$$('[data-view]').forEach(b=>b.onclick=()=>show(b.dataset.view));$('[data-open]').onclick=()=>{show('reader');openDoc(chapters[1])};$('#q').oninput=e=>{state.q=e.target.value.trim().toLowerCase();render()};$$('.chip').forEach(c=>c.onclick=()=>{state.filter=c.dataset.filter;$$('.chip').forEach(x=>x.classList.toggle('active',x===c));renderProjects()});render();openDoc(chapters[1]);
</script>
</body>
</html>
