 × 场景 应用矩阵","通用 Prompt 框架","开始新项目前的5个问题","场景选择决策树","本节核心要点"],"body":["> **前面学的思维工具不是「产品经理专用」，而是「定义问题专用」。不管你想做什么，核心思维方式都是一样的。**","✓ **思维工具是通用的**——不管你做数据分析、自动化脚本还是小工具，核心思维方式都是「先想清楚问题」","✓ **场景不同，侧重不同**——数据分析侧重JTBD（回答什么问题），自动化侧重逆向思维（什么会出错），个人工具侧重减法思维（避免过度设计），家人工具侧重故事思维（站在他们角度）","✓ **Prompt质量取决于问题定义**——AI是一个超级执行者，但「做什么」只有你能决定。问题定义得越清楚，AI的输出越有用","✓ **先做最小版本**——不管什么场景，第一版都只做最核心的1-2个功能，验证了再加"],"formula":"场景 -> 核心问题 -> 首要思维工具 -> 常见陷阱","code":"## 背景 - 我是：[你的角色/身份] - 我要做：[一句话描述目标] - 给谁用/谁会看：[用户/受众] - 使用场景：[什么时候、在哪、用什么设备] ## 核心问题/任务 [用一句话描述要解决的核心问题或完成的核心任务]","goals":["理解「本节总结：场景化思维速查表」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-145","moduleId":"product","title":"问题就在你身边，只是你没注意","level":"实战","order":146,"concepts":["问题就在你身边，只是你没注意","一个思维实验","五种发现问题的渠道","渠道一","渠道二"],"structure":["一个思维实验","五种发现问题的渠道","渠道一：自己的重复劳动","渠道二：身边人的抱怨","渠道三：现有工具的不满","渠道四：工作流程的断点","渠道五：信息获取的困难"],"body":["问题是：大多数人在\"烦\"完之后就忘了。他们继续忍受，继续抱怨，但从不停下来想一想——\"这个问题，能不能解决？\"","**观察点**：什么事情你每天/每周都在做，而且做的时候感觉\"又来了\"？","一位独立开发者厌倦了传统的时间表系统：每次记录工作时间都要打开复杂的软件，填写繁琐的表单，然后导出数据提交给 ERP 系统。他问自己：\"有没有可能做一个极简的工具，打开就能记，记完自动同步？\"","于是他用几周时间做了一个轻量级的时间追踪工具 Timesheetr。核心功能只有三个：快速记录任务、自动计算时长、一键同步到 ERP。这个工具解决了他自己的痛点，也帮助了成千上万有同样困扰的自由职业者和咨询师。","这是《The Mom Test》一书的核心洞见：当你问别人\"你觉得这个工具怎么样\"或\"你会用吗\"，得到的答案往往是礼貌性的肯定。但如果你问\"你上次遇到这个问题是什么时候？你当时怎么解决的？\"，你会得到真实的信息。","在多个地方复制粘贴同样的信息？"],"formula":"信号 -> 示例","code":"## 问题观察清单 ### 重复劳动 - [ ] 我每天重复做的事情：________________ - [ ] 我每周重复做的事情：________________ - [ ] 做这些事时，最烦的环节是：________________ ### 身边人的抱怨 - [ ] 家人最近抱怨过什么？________________","goals":["理解「问题就在你身边，只是你没注意」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-146","moduleId":"product","title":"\\\"烦恼日记\\\"法：系统性发现问题","level":"实战","order":147,"concepts":["\"烦恼日记\"法","为什么需要\"记录\"","方法来源","天记录法","操作方法","MVP"],"structure":["\"烦恼日记\"法：系统性发现问题","为什么需要\"记录\"","方法来源","天记录法","操作方法","示例 2：学生","如何避免\"记了就忘\""],"body":["你在做周报时觉得\"好烦，又要从五个表格里复制数据\"，但做完之后，这个念头就消失了。下周再做时，同样的烦恼再来一次，你又忍了过去。","这就是为什么我们需要一个系统性的方法——把这些稍纵即逝的\"烦恼瞬间\"捕捉下来。","我们把这两个思路结合起来：**用日记的形式，捕捉日常生活中的\"烦恼\"，然后从中筛选出值得用 AI 编程 解决的问题。**","**为什么烦**：每周都要做，每次都要打开5个文件，复制粘贴，检查数据有没有错","记录的最大障碍是：**当烦恼发生时，你正在忙别的事，没空停下来写日记。**","**哈佛大学幸福专家 Arthur C. Brooks 的\"痛苦日记\"**：他建议记录生活中的痛苦时刻，一个月后回顾时写下学到了什么，六个月后写下从中获得的积极结果。这种方法帮助人们从困难中发现成长的机会。"],"formula":"工具 -> 用法","code":"## 烦恼日记模板 **日期**：____ **烦恼瞬间**：用一句话描述发生了什么 **当时在做什么**：具体的任务或场景 **为什么烦**：是太慢？太麻烦？太容易出错？ **我最后怎么解决的**：忍着做完？找人帮忙？放弃了？ **这件事多久发生一次**：每天？每周？每月？偶尔？","goals":["理解「\\\"烦恼日记\\\"法：系统性发现问题」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-147","moduleId":"product","title":"什么样的问题适合用 AI 编程 解决","level":"实战","order":148,"concepts":["什么样的问题适合用 AI 编程","不是所有问题都适合","五维评估法","维度一","维度二"],"structure":["不是所有问题都适合","五维评估法","维度一：重复性（这件事多久发生一次？）","维度二：规则性（这件事有固定的步骤吗？）","维度三：可验证性（怎么知道做对了？）","维度四：敏感性（涉及的数据有多敏感？）","维度五：容错性（做错了会怎样？）"],"body":["通过前面的观察和记录，你可能已经积累了一些待解决的问题。但在投入时间之前，需要做一个重要的判断：","AI 编程 的优势是快速、低门槛、容错性高。但它也有明确的边界。选对问题，事半功倍；选错问题，可能浪费时间，甚至造成风险。","我们用五个维度来评估一个问题是否适合用 AI 编程 解决。每个维度满分 5 分，总分 25 分。","**判断技巧**：问自己\"如果这个问题今天解决了，下周我还会遇到吗？\"","**判断技巧**：试着把这件事的步骤写下来。如果写不出来，说明规则性不够。","原问题：\"做一个给客户用的预约系统\" → 涉及用户数据"],"formula":"频率 -> 分数 -> 说明","code":"## 问题筛选评分表 **问题描述**：____________________ | 维度 | 分数（0-5） | 备注 | |-----|------------|------| | 重复性 | | | | 规则性 | | | | 可验证性 | | |","goals":["理解「什么样的问题适合用 AI 编程 解决」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-148","moduleId":"product","title":"给不同人群的问题发现建议","level":"实战","order":149,"concepts":["给不同人群的问题发现建议","如果你是职场人士","三个高频问题方向","从问题到项目的完整路径","职场人士的发现技巧","MVP"],"structure":["如果你是职场人士","三个高频问题方向","从问题到项目的完整路径","职场人士的发现技巧","如果你是学生","三个高频问题方向","从问题到项目的完整路径"],"body":["每个人的生活场景不同，发现问题的方式也不同。本节为四类典型读者提供针对性的问题发现指南。","**烦恼**：需要从 5 个不同的广告平台导出数据，复制到 Excel，手动计算汇总指标，然后做成 PPT。整个过程要花 2-3 小时。","**最小方案**：做一个工具，能自动合并 5 个 Excel 文件，计算核心指标，输出汇总表格。","**观察你的工作日志**：连续三天，记录你做的每一件事和花费的时间。然后问自己：","**烦恼**：DDL 来自微信群、邮件、教务系统、实习公司的钉钉……经常漏掉重要截止日期。","数据导出：目前需要手动登录 5 个平台 → 暂时无法自动化（涉及账号安全）"],"formula":"方向 -> 典型问题 -> MVP 形态","code":"","goals":["理解「给不同人群的问题发现建议」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-149","moduleId":"product","title":"实战练习：问题发现工作坊","level":"实战","order":150,"concepts":["实战练习","练习 1","练习 2","问题 1","我选择的问题","MVP"],"structure":["练习 1：5 分钟头脑风暴（10 个烦恼）","练习 2：问题筛选评分（选出 Top 3）","问题 1：____________________","我选择的问题","练习 4：灵魂三问预检","练习 5：一句话 MVP 描述","我的 MVP 一句话描述"],"body":["本节是一个 30 分钟的实战练习，帮你从零开始找到一个值得用 AI 编程 解决的问题。","**目标**：用第 2.5 节学过的灵魂三问，快速检验你选择的问题是否足够清晰。","**自检**：如果这三个问题你都能清晰回答，说明你对问题的理解已经足够深入，可以进入下一步了。","一个能____________________的____________________，","解决____________________的____________________的问题。","不要评判，不要筛选，想到什么写什么"],"formula":"场景 -> 提问","code":"## 我的 10 个烦恼 1. ____________________ 2. ____________________ 3. ____________________ 4. ____________________ 5. ____________________ 6. ____________________","goals":["理解「实战练习：问题发现工作坊」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-150","moduleId":"product","title":"本节核心要点","level":"实战","order":151,"concepts":["本节核心要点","三条核心原则","问题发现检查清单","本节工具速查","本节学到的关键概念"],"structure":["三条核心原则","问题发现检查清单","本节工具速查","本节学到的关键概念","常见问题","下一步"],"body":["✓ **问题不是想出来的，是观察出来的。** 每一个\"好烦\"的瞬间，都是发现问题的线索。通过五种渠道（重复劳动、身边人抱怨、现有工具不满、工作流断点、信息获取困难），系统性地扫描你的日常生活。","✓ **用\"烦恼日记\"捕捉问题，用五维评分筛选问题。** 连续 7 天记录烦恼，然后用重复性、规则性、可验证性、敏感性、容错性五个维度打分，选出最适合用 AI 编程 解决的问题。","✓ **知道什么不做，和知道什么要做一样重要。** 涉及资金、隐私、监管、高并发、长期维护的问题，不适合用 AI 编程 解决。识别边界，避免踩坑。","A：这是好事！说明你避免了一个不适合的问题。回到烦恼日记，换一个问题评估。也可以考虑把问题\"降级\"到更安全的范围（比如只做个人使用的版本）。","A：完全值得。给自己做一个好用的工具，本身就是 AI 编程 的价值所在。而且，解决自己问题的过程中，你会学到技能、建立信心，为将来做更大的项目打下基础。"],"formula":"工具 -> 用途 -> 位置","code":"## 问题发现自检清单 ### 问题来源 - [ ] 我已经识别出这个问题来自哪个渠道（重复劳动/他人抱怨/工具不满/流程断点/信息困难） - [ ] 我记录了这个问题发生的频率和痛苦程度 ### 问题筛选 - [ ] 我已经用五维评分法评估了这个问题 - [ ] 总分达到 15 分以上","goals":["理解「本节核心要点」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-151","moduleId":"product","title":"开发前检查清单","level":"实战","order":152,"concepts":["开发前检查清单","秒快速版","分钟完整版","问题定义","风险预判","MVP"],"structure":["秒快速版：红绿灯判断法","分钟完整版：分维度检查","问题定义（30秒）","风险预判（60秒）","最终确认（30秒）","项目启动检查清单","基本信息"],"body":["在你打开AI工具、写第一行Prompt之前，用这份清单做最后的检查。","🟢 **三个问题都能一句话回答** → 可以开始","🟡 **有的问题说不清楚** → 需要再想想，回顾对应章节","🔴 **有的问题完全答不上来** → 先停下来，从2.1节重新开始","问题来源：□ 自己的烦恼 □ 他人的抱怨 □ 工作流断点 □ 其他"],"formula":"# -> 问题 -> 你的回答","code":"□ 我知道这个问题来自哪里（自己的烦恼/他人的抱怨/工作流断点） □ 这个问题重复出现，不是一次性的 □ 我能用一句话描述这个问题","goals":["理解「开发前检查清单」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-152","moduleId":"product","title":"从心法到技法","level":"实战","order":153,"concepts":["从心法到技法","你已经学会了什么","心法与技法的关系","从\"想清楚\"到\"说清楚\"","提示词工程基础","PRD","MVP"],"structure":["你已经学会了什么","心法与技法的关系","从\"想清楚\"到\"说清楚\"","提示词工程基础","用户旅程地图","编写第一份PRD","功能优先级"],"body":["如果你自己都没想清楚要做什么，写出来的Prompt也会是模糊的。AI会给你一个\"看起来像那么回事\"的结果，但不是你真正想要的。","为什么\"上下文\"比\"指令\"更重要","如何把用户画像和任务描述融入Prompt","好Prompt和差Prompt的区别","如何把用户的完整体验转化为开发步骤"],"formula":"能力 -> 具体表现 -> 对应章节","code":"用户：25岁职场新人，怕遗漏任务被批评 任务：快速记录今天要做的事，不遗漏重要任务 场景：早上到公司，打开电脑 MVP：添加任务、完成任务、查看今日任务 不做：分类、标签、提醒、统计","goals":["理解「从心法到技法」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-153","moduleId":"product","title":"A. 思维模型速查表","level":"实战","order":154,"concepts":["A. 思维模型速查表","模板使用顺序建议","填写示例","Pre-mortem 分析","MVP"],"structure":["模板使用顺序建议","填写示例","Pre-mortem 分析","Pre-mortem 分析","MVP 设计","MVP 设计","用户画像"],"body":["本附录汇总第二章七个思维模型的核心模板，每个模板都附有填写示例和使用场景说明。","**核心假设**：一个极简的每日待办清单，比便签纸和手机备忘录更好用","**烦恼瞬间**：_______________（一句话描述发生了什么）","**为什么烦**：□ 太慢 □ 太麻烦 □ 容易出错 □ 其他：___","**为什么烦**：☑ 太麻烦（每次都要打开5个文件，复制粘贴，检查有没有错）","重复性：这个问题多久发生一次？（每天5分，每周4分，每月2分，偶尔1分）"],"formula":"失败原因 -> 可能性(高/中/低) -> 严重性(高/中/低) -> 预防措施","code":"问题发现 → JTBD → 逆向思维 → 减法思维 → 故事思维 → 灵魂三问 → 场景适配 ↓ ↓ ↓ ↓ ↓ ↓ 找到问题 定义任务 预防失败 聚焦MVP 理解用户 最终自检","goals":["理解「A. 思维模型速查表」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-154","moduleId":"product","title":"B. 扩展案例库","level":"实战","order":155,"concepts":["B. 扩展案例库","案例索引","案例 1","背景","思维模型应用","MVP","UI"],"structure":["案例索引","案例 1：Dropbox —— 用视频代替产品","背景","思维模型应用：减法思维","关键决策","结果","启示"],"body":["本附录提供 6 个真实案例，展示如何在不同场景下应用第二章的思维模型。每个案例都包含：问题背景、思维模型应用过程、关键决策、最终结果。","2007 年，Drew Houston 有一个想法：做一个能在多台电脑之间自动同步文件的工具。","但他面临一个难题：这个产品需要开发复杂的后端系统、处理各种边界情况，开发周期可能需要一年以上。如果花一年时间做出来，结果没人用怎么办？","Houston 问自己一个关键问题：**我真正要验证的假设是什么？**","他的核心假设是：**有足够多的人遇到「多设备文件同步」这个痛点，并且愿意为解决方案付费/注册。**","打开另一台电脑，文件自动同步了"],"formula":"场景 -> 案例 -> 核心思维模型","code":"请帮我写一个 Python 脚本，自动汇总多个 Excel 文件。 特别要求： 1. 自动扫描指定文件夹下的所有 .xlsx 文件 2. 检测每个文件的格式是否符合预期，不符合时明确报错 3. 汇总完成后，输出一份校验摘要（总行数、各部门数据条数） 4. 每一步操作都写日志，方便排查问题","goals":["理解「B. 扩展案例库」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-155","moduleId":"product","title":"C. 常见误区诊断清单","level":"实战","order":156,"concepts":["C. 常见误区诊断清单","如何使用本清单","一、JTBD 思维的常见误区","误区 1.1","误区 1.2","MVP"],"structure":["如何使用本清单","一、JTBD 思维的常见误区","误区 1.1：只描述功能，不描述任务","误区 1.2：只看功能任务，忽略情感和社会任务","误区 1.3：把「我想做」当成「用户需要」","二、逆向思维的常见误区","误区 2.1：只列风险，不想应对措施"],"body":["本附录汇总第二章七个思维模型的常见误区。每个误区都配有「症状描述」「问题诊断」「改进建议」，帮助你自检和避坑。","> 「我想做一个待办清单 App，要有添加任务、删除任务、分类标签、截止日期……」","这是「功能清单」，不是「任务描述」。它告诉 AI 你想要什么功能，但没有说明用户要完成什么任务、为什么需要这些功能。","> 「当职场新人在早上开始工作时，想要快速记录今天要做的事，以便于不会遗漏重要任务。」","然后再推导功能：既然任务是「快速记录」，那么「添加任务」必须在 3 秒内完成。「分类标签」可能反而会拖慢速度，可以不做。","**自检**：对照每个误区的「症状」，看看自己是否踩坑"],"formula":"层次 -> 问题","code":"风险：_______________ 预防措施：_______________","goals":["理解「C. 常见误区诊断清单」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-156","moduleId":"product","title":"D. 深度参考资源","level":"实战","order":157,"concepts":["D. 深度参考资源","一、框架原始出处","JTBD","Pre-mortem","MVP"],"structure":["一、框架原始出处","JTBD（Jobs to be Done）","Pre-mortem（预演失败）","MVP（最小可行产品）","二、推荐书单","中文书籍","英文书籍"],"body":["本附录提供第二章思维模型的原始出处、推荐书单和免费在线资源，帮助你进一步深入学习。","**提出者**：Clayton Christensen（克莱顿·克里斯坦森）","Clayton Christensen 是哈佛商学院教授，被誉为「颠覆式创新之父」。他在研究创新时发现，理解用户真正要完成的「任务」比理解用户的人口统计学特征更有价值。","一家快餐连锁店想提升奶昔销量。传统方法是做用户调研：口味偏好、价格敏感度、包装设计。","Christensen 团队换了一个问题：「用户雇佣奶昔来完成什么任务？」","《与运气竞争》（Competing Against Luck, 2016）—— JTBD 框架的系统阐述"],"formula":"误解 -> Ries 的原意","code":"入门：《与运气竞争》第 1-4 章 ↓ 进阶：Strategyn 网站的 JTBD 案例分析 ↓ 实践：用 JTBD 模板分析 3 个你日常使用的产品 ↓ 深入：Tony Ulwick 的 Outcome-Driven Innovation","goals":["理解「D. 深度参考资源」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-157","moduleId":"product","title":"什么是提示词工程","level":"实战","order":158,"concepts":["什么是提示词工程","经过本节学习，你将掌握","先破除一个误解","一个帮你理解的比喻","从 Prompt Enginee"],"structure":["经过本节学习，你将掌握","先破除一个误解","一个帮你理解的比喻","从 Prompt Engineering 到 Context Engineering","传统编程 vs 提示词工程","你已经具备这项能力","本节要点"],"body":["很多文章会告诉你：提示词工程是一门「提问的艺术」，需要学习各种「魔法词汇」和「技巧公式」，才能让 AI 给出好答案。","**提示词工程的本质很简单：告诉 AI 足够的背景信息，让它理解你想要什么。**","没有魔法，没有咒语。只有一个核心原则：**你提供的信息越清晰完整，AI 的输出就越符合你的期望。**","这个实习生非常聪明，学习能力极强，几乎什么任务都能完成。但有一个问题：他今天才入职，对你的项目一无所知。","**方式 B**：先花 5 分钟介绍项目背景，说明用的技术栈，解释这个登录功能要实现什么效果，有什么特殊要求，然后再让他动手。","提示词工程的真正含义：不是「提问的艺术」，而是「提供上下文的艺术」"],"formula":"旧认知：Prompt Engineering -> 新认知：Context Engineering","code":"","goals":["理解「什么是提示词工程」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"product-158","moduleId":"product","title":"Context is King：上下文为王","level":"实战","order":159,"concepts":["Context is King","经过本节学习，你将掌握","一个公式","什么是上下文","三层上下文模型","Token","ReAct"],"structure":["经过本节学习，你将掌握","一个公式","什么是上下文","三层上下文模型","第一层：项目上下文","第三层：个人上下文","✅ 好提示词：包含三层上下文"],"body":["> **AI 输出的质量 = 你提供的上下文质量 × AI 的能力**","这就是为什么同样一句话，不同人问 AI 会得到完全不同的结果——差异不在于「怎么问」，而在于「问之前告诉了 AI 什么」。","把 AI 的「记忆」想象成一张餐桌。餐桌有固定大小，你放上去的盘子（信息）不能超过桌面。","**对于初学者来说**：不用太担心这个限制。日常的项目描述和任务说明，远远不会超出上下文窗口。","如果你开启一个新对话，之前告诉 AI 的所有信息都会「清零」。这就是为什么很多 AI 工具提供了「项目规则」或「系统提示词」功能——让某些上下文持久化，不用每次重复输入。","什么是「上下文」：背景信息、约束条件、期望结果"],"formula":"类型 -> 说明 -> 例子","code":"┌─────────────────────────────────────┐ │ 项目上下文 │ │ 你在做什么项目？用什么技术？ │ ├─────────────────────────────────────┤ │ 任务上下文 │ │ 当前要解决什么具体问题？ │ ├─────────────────────────────────────┤","goals":["理解「Context is King：上下文为王」在「AI 产品与编程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-159","moduleId":"frontier","title":"大模型安全总览","level":"前沿","order":160,"concepts":["大模型安全总览","一、从“好用”到“可控”","二、溯源模型机制中的安全隐患","数据污染及能力陷阱","KV Cache 与“记得太多”","Token","Attention"],"structure":["一、从“好用”到“可控”","二、溯源模型机制中的安全隐患","数据污染及能力陷阱","KV Cache 与“记得太多”的隐患","RAG、工具调用与代理化能力","三、四个维度理解大模型失控","价值对齐与有害内容"],"body":["从安全角度看，模型并没有内建“事实检测器”或“价值判断模块”，它只是根据上下文分布进行生成。所以一旦上下文中包含恶意示例、不良价值取向或","隐含指令，模型就极易顺势继续那条“话语轨道”，出现“一本正经地说错话”甚至输出违法有害内容的情况。这也意味着**大模型的安全是概率性的**，","不存在传统软件中“修复 Bug 就 100% 安全”的状态，我们只能无限降低风险发生的概率。","为了支持多轮对话和长上下文，现代大模型普遍使用 KV Cache 等记忆机制来缓存历史对话，从而在后续生成中“记得住”用户之前说过的话。这在提升对话的连贯性与“人格一贯性”的同时，也引入了两个典型安全隐患：","在基础对话之外，工业界大量使用**检索增强生成（RAG）**、**函数调用（Tools / Plugins）**和**多代理编排（Agents）**等技术，让模型具备“查资料、调接口、驱动系统”的能力。这些扩展让模型不再只是“会说话”，而是可以触达数据库、业务系统和外部 API，因此也被视为新一代高危接口：","**上下文越界可见**：如果系统在多用户、多会话之间错误复用缓存或共享检索结果，模型就可能在 B 用户的对话中无意泄露 A 用户的内容，形成“跨会话隐私泄露”。"],"formula":"风险 = 能力 x 权限 x 数据敏感度 x 失控概率","code":"","goals":["理解「大模型安全总览」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-160","moduleId":"frontier","title":"威胁建模及风险分析","level":"前沿","order":161,"concepts":["威胁建模及风险分析","一、OWASP Top 10 f","二、从对话博弈到系统入侵","数据与指令的混淆","攻击形态演进","Token","Embedding"],"structure":["一、OWASP Top 10 for LLM Applications（2025）核心风险详解","二、从对话博弈到系统入侵","数据与指令的混淆","攻击形态演进","传统防御的失效","构建语义防火墙","输入层防御"],"body":["（1）**提示注入**：攻击者通过精心设计的输入“欺骗”模型忽略既定的系统提示，转而执行恶意操作。这是目前最引人注目的 LLM 漏洞。根据攻击路径可分为：","（2）**敏感信息泄露**：模型在输出中无意泄露了敏感信息，包括训练数据中的个人隐私（PII）或系统机密。风险点主要源于：","（3）**供应链漏洞**：LLM 应用高度依赖第三方组件（模型、数据集、插件），供应链中任何一环被攻破都会危及整个应用。主要攻击形式有：","（4）**数据与模型投毒**：攻击者通过污染训练或微调数据，破坏模型的完整性，使其产生系统性偏见或植入后门。不同于提示注入的即时攻击，投毒具有持久化特征：","（5）**不当的输出处理**：下游应用盲目信任 LLM 的输出，直接将其传递给后端组件（数据库、浏览器、Shell）而未加验证。若处理不当可能引发：","**直接提示注入**：也就是“越狱”。攻击者直接与 LLM 对话，利用“角色扮演”或逻辑陷阱，诱导模型输出本应被屏蔽的有害内容。"],"formula":"风险 = 能力 x 权限 x 数据敏感度 x 失控概率","code":"import os def clean_temp_files(target_dir=\"/tmp\"): # 风险点：若上游逻辑错误传入了 \"/\" 或重要目录 # 且模型未生成路径校验逻辑，将直接导致灾难性后果 if os.path.exists(target_dir): # 没有任何二次确认或白名单检查 os.system(f\"rm -rf {target_dir}/*\")","goals":["理解「威胁建模及风险分析」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-161","moduleId":"frontier","title":"多模态全景概述","level":"前沿","order":162,"concepts":["多模态概述","一、多模态的定义与内涵","从模态到多模态","多模态的交互与表征对齐","二、多模态认知图谱","Token","LoRA"],"structure":["多模态概述","一、多模态的定义与内涵","从模态到多模态","多模态的交互与表征对齐","二、多模态认知图谱","多模态任务图谱","多模态机器学习五大挑战"],"body":["在前面的章节中，我们主要围绕文本（Text）这一单一模态系统性学习了 NLP 与 LLM 的主线能力。但真实世界的信息并不只以文字存在，图片、视频、语音、音乐、传感器、布局与结构化信号……共同构成了人类认知的“输入流”。**多模态学习**关注的就是如何让模型在这些异构信息之间建立联系，完成理解、生成与决策。","图 19-1 多模态模型 Nano Banana 生成的多模态交互示意图","> 除了跨越物理媒介的模态（如声、光、电），在**文本模态内部**，也存在“结构形态”发生显著变化的转换。例如：","> - **Text-to-Code**（文本转代码）：代码具有更严密的逻辑和语法约束。","> - **Text-to-Table**（文本转表格）：表格是结构化的二维信息。"],"formula":"风险 = 能力 x 权限 x 数据敏感度 x 失控概率","code":"","goals":["理解「多模态全景概述」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-162","moduleId":"frontier","title":"图文多模态","level":"前沿","order":163,"concepts":["图文多模态","一、视觉的 Transforme","序列化图像","ViT 模型架构细节","关键特性","Token","Embedding"],"structure":["一、视觉的 Transformer 化","序列化图像","ViT 模型架构细节","关键特性","二、连接图文的 CLIP 架构","CLIP 的架构与原理","零样本推理与提示工程"],"body":["虽然多模态领域涵盖了音频、视频、3D 点云、热成像等多种数据形式，且“多模态”的边界正在不断拓展，但**图文（Image-Text）**始终是目前研究最深入、应用最广泛，也是最能体现跨模态交互逻辑的基础组合。本节我们将深入探讨两个具有代表性的模型架构，分别是将 Transformer 引入视觉领域的 **ViT**，以及连接文本与图像语义的 **CLIP**。","Transformer 的标准输入是 1D 向量序列，而图像是 2D 网格。ViT 的处理方式非常直接且“暴力”，具体步骤如下：","（1）**Patch Embedding（把图像变成 Token，见图 19-5 左下）**：将图像 $\\mathbf{x}\\in\\mathbb{R}^{H\\times W\\times C}$ 切分为 $N$ 个固定大小的 Patch（如 $P\\times P \\times C$），展平后得到 $\\mathbf{x}_p\\in\\mathbb{R}^{N\\times(P^2\\cdot C)}$，其中","然后用一个**可学习的线性投影** $\\mathbf{E}\\in\\mathbb{R}^{(P^2\\cdot C)\\times D}$ 把每个 Patch 映射为 $D$ 维向量（**图 19-5 中的粉色长条 \"Linear Projection...\"**）。这一步在实现上等价于一个 **kernel=$P$、stride=$P$** 的卷积（把每个 patch “一次性”投到 $D$ 维）。","（2）**特殊的 `[CLS]` Token（全局聚合器，见图 19-5 左下角标 * 的紫色胶囊）**：借鉴 BERT，在序列开头拼接一个可学习的分类令牌 $\\mathbf{x}_{class}$。它更像一个“读写全局信息的槽位”，通过自注意力在层间不断从各个 patch 聚合信息。最终，我们只用该位置对应的输出向量（**图 19-5 左上角的 \"Class\" 黄色框**）来代表整张图像进行分类。","$\\mathbf{x}_{class}$：特殊的分类 Token 向量。"],"formula":"N=\\frac{H\\cdot W}{P^2} \\tag{19.1}","code":"class ImageEncoder(nn.Module): \"\"\"图像编码器\"\"\" def __init__(self, output_dim): super(ImageEncoder, self).__init__() # num_classes=0 会移除分类 head，输出 backbone 特征（维度为 vit.num_features） self.vit = timm.create_model('vit_small_patch16_224', pretrained=True, num_classes=0) self.proj = nn.Linear(self.vit.num_features, output_dim, b","goals":["理解「图文多模态」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-163","moduleId":"frontier","title":"BLIP-2 与 LLaVA","level":"前沿","order":164,"concepts":["BLIP-2 与 LLaVA","一、从对齐到生成","如何高效构建多模态生成能力？","Q-Former 与两阶段预训练","二、LLaVA 与视觉指令微调","Token","Embedding"],"structure":["一、从对齐到生成","如何高效构建多模态生成能力？","Q-Former 与两阶段预训练","二、LLaVA 与视觉指令微调","视觉指令微调的必要性","数据构建","LLaVA 架构与训练"],"body":["为了确保 Q-Former 既能理解图像，又能对接到 LLM，BLIP-2 采用了两阶段预训练策略。","图 20-3 第一阶段预训练目标 (a) ITM, (b) ITG, (c) ITC","图 20-4 BLIP-2 第二阶段预训练：对接 Decoder-based 或 Encoder-Decoder-based LLM","通过这种方式，BLIP-2 成功地用极小的代价（主要训练 Q-Former，以及将其输出映射到 LLM 词向量空间的全连接映射层）就将视觉感知能力“嫁接”到了大语言模型上。","为了让这些组件协同工作并获得多模态能力，LLaVA 同样采用了**两阶段的训练策略**："],"formula":"风险 = 能力 x 权限 x 数据敏感度 x 失控概率","code":"","goals":["理解「BLIP-2 与 LLaVA」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-164","moduleId":"frontier","title":"原生统一架构","level":"前沿","order":165,"concepts":["原生统一架构","一、迈向统一的探索","Flamingo 架构设计","局限性与思考","二、Token 级统一与单一网络","Token","Attention"],"structure":["一、迈向统一的探索","Flamingo 架构设计","局限性与思考","二、Token 级统一与单一网络","Chameleon 与统一词表","GPT-4o 与全模态原生","三、走向全能：端到端 Omni 系统的工业实践"],"body":["上节我们介绍了以 **BLIP-2** 和 **LLaVA** 为代表的“**连接**”方法。这类方法通过轻量级适配模块连接**冻结的视觉编码器**与 **大语言模型**，虽极大降低了训练成本，但底层模态的分离和输入端的生硬拼接限制了其在实时音频/视频交互等场景下的表现。为了突破这些局限，学术界与工业界正加速向**原生统一**的架构演进。","可以看到图中的图像数据会先通过**左侧的视觉路径**进行视觉编码（Vision Encoder）和重采样（Perceiver Resampler），生成固定长度的视觉特征。接着，这些特征被注入到**右侧的语言路径**中，通过插入在 LLM 层间的门控交叉注意力接口（Gated XATTN-DENSE）参与文本生成。为了支撑这一跨模态流转过程，Flamingo 设计了以下三个关键组件：","Chameleon 使用一个名为 Gafni 的图像分词器将 $512 \\times 512$ 的图像量化为 1024 个离散的 **Image Tokens**。这些视觉 Token 与文本 Token 并没有本质区别，它们共同组成了一个大小为 65,536 的**统一词表**（包含了 8192 个图像 Codebook Token）。这意味着在模型眼中，像素和文字都是来自同一个字典的“单词”。","虽然 GPT-4o 的闭源策略让我们难以窥探其单一网络的内部细节，但 **Qwen3-Omni** 为这种“全能体验”的工业落地给出了可复现的系统级拆解。它不仅在文本和视觉任务上保持了与同系列单模态模型相当的性能，也在实时音频交互上展现了很高的工程水准。","图 20-13 Audio Transformer (AuT) 架构概览"],"formula":"风险 = 能力 x 权限 x 数据敏感度 x 失控概率","code":"","goals":["理解「原生统一架构」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"frontier-165","moduleId":"frontier","title":"从 0 训练简化版 Omni 模型","level":"前沿","order":166,"concepts":["从 0 训练简化版 Omni 模","一、数据准备与预处理","获取训练数据","dataprep/prepare","dataprep/data_pa","Token","Embedding"],"structure":["一、数据准备与预处理","获取训练数据","dataprep/prepare/tokenizer.py","dataprep/data_paths.py","默认设置常量","dataprep/prepare/text_bpe.py","dataprep/prepare/text_bpe.py"],"body":["经过了这么多章节的漫长学习，想必大家已经对大模型技术的完整演进脉络有了相对全面的认知。本节我们来把此前所学的知识进行融会贯通，在单张消费级显卡上从 0 开始，使用 PyTorch 实现一个简版的 Omni 模型。我们的目标是构建一个能够同时接收**文本**和**图像**两路输入的多模态基座。在这个模型中，我们将通过投影与注入机制，将提取好的视觉特征与文本序列相结合，构建一个端到端联合计算与生成的多模态大模型。","至于图文侧最终产出的 `packs/mm/train_imgonly.jsonl`，同样以类似风格的结构化格式将 Flickr8k 的图片路径与经过基础规范的中文描述整齐地绑定在了一起：","DATA_INTERIM = Path(\"data/interim\")","DATA_PROCESSED = Path(\"data/processed\")","from tokenizers.decoders import ByteLevel as ByteLevelDecoder"],"formula":"风险 = 能力 x 权限 x 数据敏感度 x 失控概率","code":"seeker-omni/ └─ data/ ├─ raw/ │ ├─ minimind/ │ │ ├─ pretrain_hq.jsonl │ │ └─ sft_mini_512.jsonl │ └─ flickr8k/","goals":["理解「从 0 训练简化版 Omni 模型」在「安全与多模态」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]}]};const mods=DATA.modules,lessons=DATA.lessons;let st={m:"all",lv:"all",q:"",l:lessons[0]};const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s)),esc=s=>String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));const mn=id=>(mods.find(x=>x.id===id)||{}).name;function filt(){let q=st.q.trim().toLowerCase();return lessons.filter(l=>(st.m==="all"||l.moduleId===st.m)&&(st.lv==="all"||l.level===st.lv)&&(!q||JSON.stringify(l).toLowerCase().includes(q)))}function nav(){let ns=[{id:"all",name:"全部课程"}].concat(mods);$("#nav").innerHTML=ns.map(m=>`<button class="${st.m===m.id?"a":""}" data-m="${m.id}">${m.name}<br><span class=muted>${m.id==="all"?lessons.length+" 节":lessons.filter(l=>l.moduleId===m.id).length+" 节 · "+m.level}</span></button>`).join("");$("#mod").innerHTML='<option value="all">全部课程</option>'+mods.map(m=>`<option value="${m.id}">${m.name}</option>`).join("");$("#mod").value=st.m;$$("[data-m]").forEach(b=>b.onclick=()=>{st.m=b.dataset.m;render()})}function home(){$("#road").innerHTML=mods.map(m=>`<article class=card><p class=ey>${m.level}</p><h3>${m.name}</h3><p>${m.summary}</p><div class=chips>${lessons.filter(l=>l.moduleId===m.id).slice(0,3).map(x=>`<span class=chip>${esc(x.title)}</span>`).join("")}</div></article>`).join("");$("#stats").innerHTML=`<div class=stat><b>${mods.length}</b><span>学习主线</span></div><div class=stat><b>${lessons.length}</b><span>知识讲义</span></div><div class=stat><b>${lessons.reduce((n,l)=>n+l.body.length,0)}</b><span>知识段落</span></div>`}function list(){let fs=filt();$("#list").innerHTML=fs.length?fs.map(l=>`<button class="lesson ${st.l&&st.l.id===l.id?"a":""}" data-l="${l.id}"><strong>${esc(l.title)}</strong><small>${mn(l.moduleId)} · ${l.level}</small></button>`).join(""):"<div class=empty>没有匹配章节。</div>";$$("[data-l]").forEach(b=>b.onclick=()=>openL(b.dataset.l))}function openL(id){let l=lessons.find(x=>x.id===id);if(!l)return;st.l=l;view("learn");$("#rm").textContent=mn(l.moduleId);$("#rt").textContent=l.title;$("#meta").innerHTML=`<span class=chip>${l.level}</span><span class=chip>第 ${l.order} 节</span>`;$("#goals").innerHTML=l.goals.map(x=>`<li>${esc(x)}</li>`).join("");$("#concepts").innerHTML=l.concepts.map(x=>`<span class=chip>${esc(x)}</span>`).join("");$("#practices").innerHTML=l.practice.map(x=>`<li>${esc(x)}</li>`).join("");$("#article").innerHTML=article(l);list()}function article(l){let sections=l.structure.length?`<h3>一、章节结构</h3><ul>${l.structure.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"";let body=`<h3>二、知识摘编</h3><ul>${l.body.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;let formula=l.formula?`<div class=formula>${esc(l.formula)}</div>`:"";let code=l.code?`<h3>三、代码线索</h3><pre class=code>${esc(l.code)}</pre>`:"";return `<p>本讲义从课程章节中抽取知识结构，并按本站学习路径重组。重点是理解概念、流程、边界与落地方法。</p>${sections}${body}${formula}${code}<h3>学习者要会什么</h3><table><tr><th>能力</th><th>可观察表现</th></tr><tr><td>概念复述</td><td>能解释关键词，并说明它解决的问题。</td></tr><tr><td>流程建模</td><td>能画出输入、处理、输出、评估四个环节。</td></tr><tr><td>工程判断</td><td>能说出适用场景、失败边界和排查入口。</td></tr></table>`}function matrix(){$("#matrixGrid").innerHTML=mods.map(m=>`<article class=card><p class=ey>${m.level}</p><h3>${m.name}</h3><p>${m.summary}</p><div class=chips>${lessons.filter(l=>l.moduleId===m.id).slice(0,10).map(x=>`<span class=chip>${esc(x.title)}</span>`).join("")}</div></article>`).join("")}function view(v){$$(".view").forEach(x=>x.classList.toggle("on",x.id===v))}function render(){nav();home();list();matrix();if(!filt().some(l=>st.l&&l.id===st.l.id))st.l=filt()[0]||lessons[0];openL(st.l.id);view("home")}function bind(){$("#q").oninput=e=>{st.q=e.target.value;list()};$("#mod").onchange=e=>{st.m=e.target.value;render()};$("#lev").onchange=e=>{st.lv=e.target.value;list()};$("#start").onclick=()=>openL((filt()[0]||lessons[0]).id);$$("[data-v]").forEach(b=>b.onclick=()=>view(b.dataset.v))}nav();home();list();matrix();bind();openL(lessons[0].id);view("home");</script></body></html>
