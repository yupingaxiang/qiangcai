<title>AI 知识书院</title>
<style>
:root{--paper:#f7f0dc;--paper2:#fffaf0;--ink:#26180f;--muted:#6f604c;--line:rgba(90,58,29,.2);--red:#a6322b;--red2:#76211d;--pine:#245345;--gold:#a87931;--shadow:0 24px 70px rgba(56,38,20,.18);font-family:STSong,SimSun,Microsoft YaHei,serif}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 10% 0,rgba(168,121,49,.22),transparent 26rem),radial-gradient(circle at 90% 5%,rgba(36,83,69,.16),transparent 28rem),linear-gradient(120deg,#ead3a1,var(--paper) 38%,#f3e3bd)}body:before{content:'';position:fixed;inset:0;z-index:-1;opacity:.28;background-image:linear-gradient(rgba(90,58,29,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(90,58,29,.045) 1px,transparent 1px);background-size:36px 36px}button,input{font:inherit}button{cursor:pointer}.shell{display:grid;grid-template-columns:292px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;padding:26px 18px;border-right:1px solid var(--line);background:rgba(247,240,220,.86);backdrop-filter:blur(16px)}.seal{display:grid;place-items:center;width:58px;height:58px;margin-bottom:14px;border:2px solid var(--red);border-radius:8px;color:var(--red);font-weight:900;line-height:1.05;background:rgba(255,250,240,.7)}h1,h2,h3,p{margin-top:0}.brand h1{font-size:28px;line-height:1.18}.brand p,.note,.muted{color:var(--muted);line-height:1.75}.note{margin-top:24px;padding-top:16px;border-top:1px solid var(--line);font-size:14px}.nav-title,.eyebrow{color:var(--red);font-size:13px;font-weight:900;letter-spacing:0}.nav-title{margin:24px 0 10px}.nav,.chapter-list{display:grid;gap:8px}.nav button,.chapter,.filter,.primary,.ghost{min-height:40px;border:1px solid var(--line);border-radius:4px;background:rgba(255,250,240,.68);color:var(--ink)}.nav button{padding:10px 12px;text-align:left}.nav button.active,.chapter.active,.filter.active{border-color:rgba(166,50,43,.45);background:rgba(166,50,43,.09);color:var(--red2);font-weight:800}.top{position:sticky;top:0;z-index:10;padding:18px 34px;border-bottom:1px solid var(--line);background:rgba(247,240,220,.8);backdrop-filter:blur(18px)}.search{display:flex;gap:10px;align-items:center;width:min(760px,100%);padding:0 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,250,240,.78)}.search b{color:var(--red);font-size:13px}.search input{width:100%;height:42px;border:0;outline:0;background:transparent;color:var(--ink)}.view{display:none;padding:34px}.view.visible{display:block}.hero{min-height:calc(100vh - 136px);display:grid;grid-template-columns:minmax(0,.96fr) minmax(340px,1.04fr);gap:42px;align-items:center}.hero h2{font-size:clamp(42px,7vw,84px);line-height:1.04}.hero-text{max-width:720px;margin:24px 0 28px;color:var(--muted);font-size:18px;line-height:1.9}.actions,.filters,.tags{display:flex;gap:10px;flex-wrap:wrap}.primary,.ghost{padding:0 18px;font-weight:800}.primary{border-color:var(--red);background:var(--red);color:#fff8e7}.scroll{position:relative;min-height:510px;border:1px solid rgba(82,52,24,.26);border-radius:6px;background:linear-gradient(90deg,rgba(102,61,20,.08),transparent 12%,transparent 88%,rgba(102,61,20,.08)),linear-gradient(135deg,#fff8e7,#ecd7a8);box-shadow:var(--shadow);overflow:hidden}.scroll:before,.scroll:after{content:'';position:absolute;top:0;bottom:0;width:18px;background:linear-gradient(#8b592c,#c4934b,#80502c)}.scroll:before{left:0}.scroll:after{right:0}.paths{position:absolute;inset:38px 42px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card,.stage{padding:18px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,240,.72);box-shadow:0 10px 30px rgba(56,38,20,.08)}.card h3,.stage h3{font-size:20px;margin-bottom:8px}.card p,.stage p{color:var(--muted);line-height:1.75}.section{margin-top:54px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.tag{display:inline-flex;padding:4px 8px;border-radius:999px;background:#dce8dc;color:var(--pine);font-size:12px;font-weight:800}.reader{display:grid;grid-template-columns:340px minmax(0,1fr);gap:20px;align-items:start}.library{position:sticky;top:96px;max-height:calc(100vh - 124px);overflow:auto;padding:16px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,240,.68)}.filter{padding:0 12px}.chapter{width:100%;padding:12px;text-align:left}.chapter small{display:block;margin-top:4px;color:var(--muted);line-height:1.45}.paper{min-height:calc(100vh - 124px);border:1px solid rgba(82,52,24,.22);border-radius:6px;background:linear-gradient(90deg,rgba(149,101,45,.04),transparent 8%,transparent 92%,rgba(149,101,45,.04)),rgba(255,250,240,.8);box-shadow:var(--shadow)}.reader-head{display:flex;justify-content:space-between;gap:18px;padding:26px 30px;border-bottom:1px solid var(--line)}.md{padding:34px 42px 52px;font-size:17px;line-height:2;overflow-wrap:anywhere}.md h1{font-size:35px;line-height:1.25}.md h2{margin:38px 0 14px;padding-top:18px;border-top:1px solid var(--line);color:var(--red2);font-size:26px}.md h3{font-size:21px}.md p,.md li{color:#34271b}.md blockquote{margin:24px 0;padding:14px 18px;border-left:4px solid var(--red);background:rgba(166,50,43,.07);color:var(--muted)}.md table{width:100%;border-collapse:collapse;display:block;overflow-x:auto}.md th,.md td{padding:10px 12px;border:1px solid var(--line)}.md th{background:rgba(36,83,69,.1)}.formula{display:block;margin:22px 0;padding:16px 18px;overflow-x:auto;border:1px solid rgba(80,54,26,.18);border-radius:6px;background:rgba(255,248,230,.76);font-family:Cambria Math,Times New Roman,serif;text-align:center;color:#2d2116;line-height:1.8}.empty{color:var(--muted)}@media(max-width:1100px){.shell{grid-template-columns:1fr}.side{position:static;height:auto}.hero,.reader{grid-template-columns:1fr}.library{position:static;max-height:none}.grid,.paths{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){.top,.view{padding:18px}.hero{min-height:auto}.scroll{min-height:790px}.grid,.paths{grid-template-columns:1fr}.md{padding:24px 20px 36px}.hero h2{font-size:42px}}
</style>
</head>
<body>
<div class='shell'><aside class='side'><div class='brand'><div class='seal'>AI<br>书院</div><h1>AI 知识书院</h1><p>原创 AI 学习地图：从模型根基到 RAG、Agent，再到 AI 产品交付。</p></div><div class='nav-title'>书院导航</div><nav class='nav'><button class='active' data-view='home'>总纲</button><button data-view='chapters'>讲义</button><button data-view='map'>能力地图</button><button data-view='projects'>实战题册</button></nav><p class='note'>本站不是资料搬运。公开课程只用于覆盖面参考，正文、公式说明与练习均为重新组织的原创讲义。</p></aside><main><header class='top'><label class='search'><b>检索</b><input id='search' type='search' placeholder='搜索 Transformer、RAG、Agent、部署、安全...'></label></header><section id='home' class='view visible'><div class='hero'><div><p class='eyebrow'>卷首语</p><h2>把零散教程，炼成一张自己的 AI 修行图</h2><p class='hero-text'>我们把大模型基础、训练微调、RAG、Agent、AI 编程、部署安全和多模态放到同一条能力脉络里，让学习从看过很多变成知道下一步练什么。</p><div class='actions'><button class='primary' data-open='overview'>读总纲</button><button class='ghost' data-view='chapters'>进入讲义</button></div></div><div class='scroll'><div id='heroPaths' class='paths'></div></div></div><section class='section'><p class='eyebrow'>六艺</p><h2>AI 工程六条主脉</h2><div id='stageGrid' class='grid'></div></section></section><section id='chapters' class='view'><div class='reader'><aside class='library'><p class='eyebrow'>讲义目录</p><div class='filters' id='filters'></div><div id='chapterList' class='chapter-list section'></div></aside><article class='paper'><div class='reader-head'><div><p id='readerStage' class='eyebrow'></p><h2 id='readerTitle'>选择一卷讲义</h2></div><a href='#map'>能力地图</a></div><div id='markdown' class='md'>从左侧选择一卷开始阅读。</div></article></div></section><section id='map' class='view'><p class='eyebrow'>地图</p><h2>从入门到交付的能力矩阵</h2><div id='mapGrid' class='grid section'></div></section><section id='projects' class='view'><p class='eyebrow'>题册</p><h2>项目化练习</h2><div id='projectGrid' class='grid section'></div></section></main></div>
<script>
const stages=[{id:'foundation',title:'模型根基',summary:'NLP、向量表示、注意力、Transformer 与预训练范式。',tags:['NLP','Transformer','Embedding']},{id:'training',title:'训练微调',summary:'Tokenizer、预训练、SFT、PEFT、RLHF、量化和推理优化。',tags:['SFT','LoRA','RLHF']},{id:'rag',title:'知识检索',summary:'加载、切分、索引、召回、重排、生成和评估。',tags:['RAG','Vector DB','Graph RAG']},{id:'agent',title:'智能体',summary:'工具调用、记忆、规划、协议、多智能体和评估。',tags:['Tool','Memory','Protocol']},{id:'product',title:'AI 产品化',summary:'PRD、Vibe Coding、测试、部署、反馈和迭代。',tags:['PRD','Vibe','CI/CD']},{id:'frontier',title:'安全与前沿',summary:'安全边界、多模态、Omni 架构和未来产品形态。',tags:['Safety','Multimodal','Omni']}];
const lines={overview:['# 总纲：AI 应用全栈到底学什么','如果把 AI 应用看成一座书院，底层不是某个工具，而是一条能力链：','> 模型理解世界，检索补足知识，智能体组织行动，产品工程把能力交付给用户。','| 层级 | 解决的问题 | 典型能力 |','| --- | --- | --- |','| 模型根基 | 语言如何变成可计算对象 | Token、Embedding、Transformer |','| 训练微调 | 如何让模型形成或适配能力 | Pretrain、SFT、LoRA、RLHF |','| RAG 工程 | 如何接入外部知识 | Chunk、Index、Retriever、Rerank |','| Agent 系统 | 如何把模型变成行动者 | Tool、Memory、Plan、Protocol |','| 产品交付 | 如何让能力稳定可用 | PRD、测试、部署、监控、迭代 |','学习顺序：先懂模型，再会调模型，再接知识，再组织工具，最后让产品可上线、可维护、可迭代。'],transformer:['# 模型根基：从 Token 到 Transformer','语言模型的第一步不是理解，而是把文本切成可以计算的符号。Token 是模型的字粒、词粒或片段粒；Embedding 则把每个 Token 放到连续向量空间里。','Embedding 相似度常用余弦形式：','::formula sim(q,d) = q · d / (||q|| ||d||)','Transformer 的核心是缩放点积注意力：','::formula Attention(Q,K,V) = softmax(QKᵀ / √dₖ) V','它做三件事：计算我和谁相关、把相关性归一化、用相关性重组上下文。','常见误区：Embedding 相似不等于事实正确；Transformer 不是长期记忆库；上下文越长不代表答案越可靠。'],training:['# 训练微调：能力从哪里来','大模型能力不是一次训练得到的，而是分阶段塑形。','| 阶段 | 目标 | 典型数据 |','| --- | --- | --- |','| 预训练 | 学语言、知识和统计模式 | 大规模文本 |','| 指令微调 | 学会按人类指令回答 | 指令-回答样本 |','| 偏好对齐 | 更符合人类偏好 | 成对偏好或奖励信号 |','| 领域适配 | 适配任务或风格 | 私有领域样本 |','LoRA 的思想是在原权重旁边加低秩更新：','::formula W′ = W + ΔW,  ΔW = B A','事实更新优先用检索；格式稳定优先用 schema；行为迁移才考虑微调；价值偏好依赖对齐。'],rag:['# RAG 工程：让模型有据可查','RAG 不是把资料塞给模型，而是一套外部知识供应链。','标准链路：加载、清洗、切分、索引、召回、重排、生成、评估。','混合检索常把语义召回和关键词召回结合：','::formula S(q,d) = α S_dense(q,d) + (1 - α) S_sparse(q,d)','Chunk 设计原则：一个 chunk 应该独立表达一个小主题；不要只按固定字数切；标题、列表和表格要保留语义；召回不到证据时，生成阶段不要硬答。'],agent:['# Agent 系统：从回答到行动','Agent 的关键不是像人，而是让模型在约束下完成可验证的行动。','| 模块 | 作用 |','| --- | --- |','| 指令 | 定义角色、目标、边界 |','| 工具 | 连接搜索、数据库、代码执行等外部能力 |','| 记忆 | 保存长期偏好、项目状态或历史事实 |','| 调度 | 决定下一步、错误恢复和停止条件 |','一个稳健 Agent 往往有明确停止条件：','::formula stop = goal_met ∨ budget_exhausted ∨ risk_detected','工具边界必须清楚：读写分离、高风险确认、输出 schema、失败返回可解释错误。'],product:['# AI 产品化：从想法到上线','AI 编程不是让模型随便写代码，而是让人用产品判断力指挥模型。','最小 PRD 必须回答：用户是谁、痛点是什么、场景在哪里、P0 功能是什么、不做什么、怎样验收。','Vibe Coding 的正确分工：你负责目标、边界、优先级和验收；AI 负责生成候选方案和代码。','上线前检查：首屏是否直达核心任务；用户是否能 30 秒完成一次主要操作；错误信息是否能指导下一步；是否有日志、回滚和版本记录。'],frontier:['# 安全、多模态与未来边界','当 AI 系统能看图、读文、调用工具、写代码，它就不再只是聊天窗口，而是一套会影响现实流程的软件系统。','安全至少包括：数据边界、权限边界、行为边界和评估边界。','多模态不是能看图片这么简单，而是把文本、图像、音频和动作放到可协同推理的空间里。','如果业务核心证据来自截图、票据、视频、仪表盘或手写内容，纯文本 LLM 很可能不是最终形态。']};
const chapters=[['overview','foundation','总纲：AI 应用全栈到底学什么','建立 LLM、RAG、Agent 与 AI 编程之间的关系。'],['transformer','foundation','模型根基：从 Token 到 Transformer','用自己的语言理解注意力机制和表示学习。'],['training','training','训练微调：能力从哪里来','区分预训练、指令微调、偏好对齐和参数高效微调。'],['rag','rag','RAG 工程：让模型有据可查','从文档进入系统到答案返回的完整链路。'],['agent','agent','Agent 系统：从回答到行动','把模型封装成能规划、调用工具、记忆和协作的系统。'],['product','product','AI 产品化：从想法到上线','用产品经理思维约束 AI 编程和系统交付。'],['frontier','frontier','安全、多模态与未来边界','理解模型系统走向真实世界时的风险和新形态。']].map(x=>({id:x[0],stage:x[1],title:x[2],summary:x[3],body:lines[x[0]]}));
const projects=[['知识库问答','用自己的课程笔记做一个 RAG 问答系统，答案必须带证据。','RAG,评估'],['论文阅读 Agent','检索论文段落、解释公式、生成摘要，但不能伪造引用。','Agent,工具'],['学习卡片生成器','输入主题，输出结构化学习卡片，并支持复制保存。','产品,AI 编程'],['LoRA 决策表','判断一个需求应该用 Prompt、RAG 还是 LoRA。','微调,决策'],['多模态票据助手','抽取票据图片字段，并设计人工校验流程。','多模态,安全'],['Transformer 可视化','解释 Query、Key、Value 和注意力权重。','基础,可视化']].map(x=>({title:x[0],summary:x[1],tags:x[2].split(',')}));
const state={view:'home',stage:'all',query:'',chapter:chapters[0]};const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));const esc=s=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');const stageName=id=>(stages.find(s=>s.id===id)||{}).title||'总纲';
function stageCard(s){return `<article class='stage'><b>${s.title}</b><h3>${s.summary.split('，')[0]}</h3><p>${s.summary}</p><div class='tags'>${s.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div></article>`}function renderStages(){const html=stages.map(stageCard).join('');$('#heroPaths').innerHTML=html;$('#stageGrid').innerHTML=html}function renderFilters(){const html=[`<button class='filter ${state.stage==='all'?'active':''}' data-stage='all'>全部</button>`].concat(stages.map(s=>`<button class='filter ${state.stage===s.id?'active':''}' data-stage='${s.id}'>${s.title}</button>`)).join('');$('#filters').innerHTML=html;$$('.filter').forEach(b=>b.onclick=()=>{state.stage=b.dataset.stage;renderFilters();renderChapters()})}function filteredChapters(){const q=state.query.trim().toLowerCase();return chapters.filter(c=>(state.stage==='all'||c.stage===state.stage)&&(!q||JSON.stringify(c).toLowerCase().includes(q)))}function renderChapters(){const list=filteredChapters();$('#chapterList').innerHTML=list.length?list.map(c=>`<button class='chapter ${state.chapter.id===c.id?'active':''}' data-id='${c.id}'><strong>${c.title}</strong><small>${stageName(c.stage)} · ${c.summary}</small></button>`).join(''):`<p class='empty'>没有匹配的讲义。</p>`;$$('#chapterList .chapter').forEach(b=>b.onclick=()=>openChapter(b.dataset.id))}function renderMarkdown(lines){let out=[];for(let i=0;i<lines.length;i++){let line=lines[i];if(!line.trim())continue;if(line.startsWith('|')){let rows=[];while(i<lines.length&&lines[i].startsWith('|')){if(!lines[i].includes('---'))rows.push(lines[i]);i++}i--;let html='<table>'+rows.map((r,idx)=>'<tr>'+r.split('|').slice(1,-1).map(c=>idx===0?`<th>${esc(c.trim())}</th>`:`<td>${esc(c.trim())}</td>`).join('')+'</tr>').join('')+'</table>';out.push(html);continue}if(line.startsWith('# ')){out.push(`<h1>${esc(line.slice(2))}</h1>`);continue}if(line.startsWith('## ')){out.push(`<h2>${esc(line.slice(3))}</h2>`);continue}if(line.startsWith('> ')){out.push(`<blockquote>${esc(line.slice(2))}</blockquote>`);continue}if(line.startsWith('::formula ')){out.push(`<div class='formula'>${esc(line.slice(10))}</div>`);continue}out.push(`<p>${esc(line)}</p>`)}return out.join('')}function openChapter(id){const c=chapters.find(x=>x.id===id);if(!c)return;state.chapter=c;setView('chapters');$('#readerStage').textContent=stageName(c.stage);$('#readerTitle').textContent=c.title;$('#markdown').innerHTML=renderMarkdown(c.body);renderChapters()}function acceptance(id){return{foundation:'能解释 attention 公式和 embedding 相似度边界。',training:'能判断需求该用 Prompt、RAG、SFT、LoRA 还是 RLHF。',rag:'能设计从文档到答案的可评估检索链路。',agent:'能给工具调用写出 schema、权限和停止条件。',product:'能写最小 PRD，并区分 P0/P1/不做。',frontier:'能识别多模态输入和 AI 权限带来的风险。'}[id]}function renderMap(){$('#mapGrid').innerHTML=stages.map(s=>`<article class='card'><h3>${s.title}</h3><p>${s.summary}</p><div class='tags'>${s.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div><p><b>验收：</b>${acceptance(s.id)}</p></article>`).join('')}function renderProjects(){const q=state.query.trim().toLowerCase();const items=projects.filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q));$('#projectGrid').innerHTML=items.map(p=>`<article class='card'><h3>${p.title}</h3><p>${p.summary}</p><div class='tags'>${p.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div></article>`).join('')}function setView(v){state.view=v;$$('.view').forEach(n=>n.classList.toggle('visible',n.id===v));$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v))}function bind(){$$('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));$$('[data-open]').forEach(b=>b.onclick=()=>openChapter(b.dataset.open));$('#search').oninput=e=>{state.query=e.target.value;renderChapters();renderProjects()}}function init(){renderStages();renderFilters();renderChapters();renderMap();renderProjects();bind();openChapter('overview');setView('home')}window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
