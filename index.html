<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 知识书院</title><style>
:root{--paper:#f7f0dc;--ink:#24180f;--muted:#6b5b45;--line:rgba(89,56,27,.22);--red:#a4322b;--deep:#74211d;--green:#245345;--jade:#dce9dc;--shadow:0 24px 70px rgba(55,37,18,.16);font-family:"Noto Serif SC","Songti SC","Microsoft YaHei",serif}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:linear-gradient(120deg,#ead3a1,var(--paper) 42%,#f3e3bd)}button,input,select{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:310px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;padding:24px 18px;border-right:1px solid var(--line);background:rgba(247,240,220,.92);backdrop-filter:blur(16px)}.seal{display:grid;place-items:center;width:58px;height:58px;margin-bottom:14px;border:2px solid var(--red);border-radius:8px;color:var(--red);font-weight:900;line-height:1.05;background:rgba(255,250,240,.72)}h1,h2,h3,p{margin-top:0}.brand h1{font-size:28px}.muted,.brand p,.lesson small,.note{color:var(--muted);line-height:1.65}.top{position:sticky;top:0;z-index:20;padding:16px 30px;border-bottom:1px solid var(--line);background:rgba(247,240,220,.84);backdrop-filter:blur(18px)}.bar{display:grid;grid-template-columns:minmax(240px,1fr) 170px 160px;gap:10px}.search,.sel{height:42px;border:1px solid var(--line);border-radius:999px;background:rgba(255,250,240,.78);color:var(--ink)}.search{display:flex;align-items:center;gap:10px;padding:0 14px}.search b{color:var(--red);font-size:13px}.search input{width:100%;border:0;outline:0;background:transparent}.sel{padding:0 14px}.view{display:none;padding:30px}.view.on{display:block}.hero{display:grid;grid-template-columns:minmax(0,.95fr) minmax(360px,1.05fr);gap:38px;align-items:center;min-height:calc(100vh - 112px)}.ey{margin-bottom:10px;color:var(--red);font-size:13px;font-weight:900}.hero h2{font-size:clamp(42px,6vw,78px);line-height:1.05}.copy{max-width:760px;color:var(--muted);font-size:18px;line-height:1.9}.btn{min-height:40px;padding:0 16px;border:1px solid var(--line);border-radius:4px;background:rgba(255,250,240,.72);color:var(--ink);font-weight:800}.btn.p{border-color:var(--red);background:var(--red);color:#fff8e7}.actions,.chips,.meta{display:flex;gap:10px;flex-wrap:wrap}.scroll{position:relative;min-height:560px;border:1px solid rgba(82,52,24,.26);border-radius:6px;background:linear-gradient(90deg,rgba(102,61,20,.08),transparent 12%,transparent 88%,rgba(102,61,20,.08)),linear-gradient(135deg,#fff8e7,#ecd7a8);box-shadow:var(--shadow);overflow:hidden}.scroll:before,.scroll:after{content:"";position:absolute;top:0;bottom:0;width:18px;background:linear-gradient(#8b592c,#c4934b,#80502c)}.scroll:before{left:0}.scroll:after{right:0}.road{position:absolute;inset:34px 42px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card,.lesson,.panel{border:1px solid var(--line);border-radius:6px;background:rgba(255,250,240,.75);box-shadow:0 10px 30px rgba(55,37,18,.08)}.card,.panel{padding:18px}.card p,.panel p{color:var(--muted);line-height:1.72}.chip{display:inline-flex;padding:4px 8px;border-radius:999px;background:var(--jade);color:var(--green);font-size:12px;font-weight:800}.navt{margin:24px 0 10px;color:var(--red);font-size:13px;font-weight:900}.nav{display:grid;gap:8px}.nav button,.lesson{width:100%;text-align:left}.nav button{min-height:42px;padding:10px 12px;border:1px solid var(--line);border-radius:4px;background:rgba(255,250,240,.68);color:var(--ink)}.nav button.a,.lesson.a{border-color:rgba(164,50,43,.44);background:rgba(164,50,43,.09);color:var(--deep);font-weight:900}.note{margin-top:24px;padding-top:16px;border-top:1px solid var(--line);font-size:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.stat{padding:12px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,240,.72)}.stat b{display:block;font-size:24px;color:var(--deep)}.course{display:grid;grid-template-columns:340px minmax(0,1fr) 280px;gap:18px;align-items:start}.cat,.assist{position:sticky;top:92px;max-height:calc(100vh - 116px);overflow:auto}.cat{padding:14px;border:1px solid var(--line);border-radius:6px;background:rgba(255,250,240,.7)}.lesson{padding:12px;margin-bottom:8px}.lesson strong{display:block}.reader{min-height:calc(100vh - 116px);border:1px solid rgba(82,52,24,.22);border-radius:6px;background:linear-gradient(90deg,rgba(149,101,45,.04),transparent 8%,transparent 92%,rgba(149,101,45,.04)),rgba(255,250,240,.82);box-shadow:var(--shadow)}.rh{padding:24px 30px;border-bottom:1px solid var(--line)}.rh h2{font-size:32px}.article{padding:30px 40px 46px;font-size:17px;line-height:1.95}.article h3{margin-top:34px;color:var(--deep);font-size:23px}.article li{margin:8px 0;color:#34271b}.article table{display:block;width:100%;border-collapse:collapse;overflow:auto}.article th,.article td{padding:10px 12px;border:1px solid var(--line)}.article th{background:rgba(36,83,69,.1)}.formula,.code{margin:20px 0;padding:16px;border:1px solid rgba(80,54,26,.18);border-radius:6px;overflow:auto}.formula{font-family:"Cambria Math","Times New Roman",serif;text-align:center;background:rgba(255,248,230,.78)}.code{font-family:Consolas,monospace;white-space:pre-wrap;background:#241b14;color:#fff5df}.assist{display:grid;gap:12px}.mini{margin:0;padding-left:18px}.mini li{margin:6px 0;color:#3a2b1d}.matrix{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.empty{padding:20px;color:var(--muted)}@media(max-width:1200px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.hero,.course{grid-template-columns:1fr}.cat,.assist{position:static;max-height:none}.matrix,.road{grid-template-columns:repeat(2,minmax(0,1fr))}.bar{grid-template-columns:1fr}}@media(max-width:700px){.top,.view{padding:16px}.road,.matrix{grid-template-columns:1fr}.scroll{min-height:980px}.article{padding:24px 20px 34px}.hero h2{font-size:42px}}</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="seal">AI<br>书院</div><h1>AI 知识书院</h1><p>面向学习者的 AI 全栈课程：每个模块都从原始课程资料中抽取章节结构与知识内容，再重组为本站讲义。</p></div><div class="navt">课程主线</div><nav id="nav" class="nav"></nav><p class="note">前台只呈现重组后的学习内容，不展示源项目路径或品牌信息。</p></aside><main><header class="top"><div class="bar"><label class="search"><b>检索</b><input id="q" placeholder="搜索 LoRA、Text2SQL、MCP、Docker、用户认证..."></label><select id="mod" class="sel"></select><select id="lev" class="sel"><option value="all">全部难度</option><option>入门</option><option>进阶</option><option>实战</option><option>前沿</option></select></div></header><section id="home" class="view on"><div class="hero"><div><p class="ey">总纲</p><h2>把课程知识，重排成一条学习路径</h2><p class="copy">这版从源 Markdown 章节中抽取小节、关键段落、表格、公式和代码线索，按学习者视角重组为目标、知识摘编、章节结构、练习与验收。</p><div class="actions"><button class="btn p" id="start">开始学习</button><button class="btn" data-v="matrix">看能力矩阵</button></div><div class="stats" id="stats"></div></div><div class="scroll"><div id="road" class="road"></div></div></div></section><section id="learn" class="view"><div class="course"><aside class="cat"><p class="ey">章节目录</p><div id="list"></div></aside><article class="reader"><div class="rh"><p id="rm" class="ey"></p><h2 id="rt"></h2><div id="meta" class="meta"></div></div><div id="article" class="article"></div></article><aside class="assist"><div class="panel"><p class="ey">本章目标</p><ul id="goals" class="mini"></ul></div><div class="panel"><p class="ey">关键概念</p><div id="concepts" class="chips"></div></div><div class="panel"><p class="ey">练习与验收</p><ul id="practices" class="mini"></ul></div></aside></div></section><section id="matrix" class="view"><p class="ey">能力矩阵</p><h2>模块覆盖范围</h2><div id="matrixGrid" class="matrix"></div></section></main></div><script>const DATA={"modules":[{"id":"foundation","name":"大模型基础","level":"入门","summary":"NLP、文本表示、序列模型、注意力、Transformer、预训练模型与生成策略。"},{"id":"training","name":"训练微调与部署","level":"进阶","summary":"分类、NER、PEFT、LoRA、RLHF、DPO、量化、加速、API 服务与自动化部署。"},{"id":"rag","name":"RAG 知识工程","level":"实战","summary":"数据加载、切分、嵌入、向量库、混合检索、Text2SQL、评估、图谱 RAG 与项目实践。"},{"id":"agent","name":"Agent 系统","level":"进阶","summary":"智能体范式、工具调用、记忆、上下文工程、通信协议、评估与综合案例。"},{"id":"product","name":"AI 产品与编程","level":"实战","summary":"PRD、AI 编程、技术栈、UI/UX、数据库、后端、认证安全、测试、部署与迭代。"},{"id":"frontier","name":"安全与多模态","level":"前沿","summary":"威胁建模、权限边界、多模态表示、VQA、统一架构与 Omni 雏形。"}],"lessons":[{"id":"foundation-000","moduleId":"foundation","title":"NLP 概述","level":"入门","order":1,"concepts":["NLP 概述","一、自然语言处理是什么？","定义与核心任务","NLP 的技术层次","二、NLP 的发展历程","Token","Word2Vec"],"structure":["一、自然语言处理是什么？","定义与核心任务","NLP 的技术层次","二、NLP 的发展历程：从规则到智能","三、NLP 的主要任务","四、NLP 面临的主要挑战","小结"],"body":["> 从手机里的语音助手，到能帮你写代码、改文章甚至聊人生哲学的 ChatGPT，你会发现机器似乎越来越“懂”你了。这些几年前还被视为科幻电影情节的场景，如今已悄然融入了我们的日常生活。","> 这一切的背后，都是**自然语言处理**。它的目标就是打破人类语言与机器代码之间的隔阂，让计算机真正理解我们在说什么。本项目将带你走进 NLP 的世界，看看计算机是如何一步步学会“听懂”人话，并像人类一样“表达”的。","**自然语言处理（Natural Language Processing, NLP）** 是人工智能（AI）领域的重要组成部分，它赋予计算机**理解、解释、生成人类语言**的能力，并基于这些能力**对文本数据进行决策** 。NLP 旨在弥合人类交流的模糊性、情境性和复杂性与计算机精确、形式化的指令系统之间的鸿沟。例如，计算机需要理解“我今天很蓝”，这里的“蓝”并非颜色，而是情绪的表达——这对于机器来说是个挑战。","> **通俗理解**就是教会计算机“读懂”文字、“听懂”语音，并能像人一样“说出”话语、完成任务。","NLP 的技术体系可以看作一个层层递进的金字塔。为了让计算机由表及里地理解语言，通常将其处理过程划分为四个由浅入深的层次：","**词法分析**：处理文本的基础单元——词。主要工作包括**分词**（将句子切分为词语，如“南京市长江大桥”应切分为 `南京市 / 长江大桥`）和**词性标注**（为每个词标注名词、动词等语法角色）。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"","goals":["理解「NLP 概述」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-001","moduleId":"foundation","title":"环境准备","level":"入门","order":2,"concepts":["环境准备","一、安装 Anaconda","Anaconda 简介","下载 Anaconda 安装包","Windows 安装流程","UX"],"structure":["一、安装 Anaconda","Anaconda 简介","下载 Anaconda 安装包","Windows 安装流程","四、在环境中安装常用依赖"],"body":["> 如果已经比较熟悉 `pyenv`、`venv` 或 `uv` 等其他环境管理工具，也可以继续使用。","> 如果是第一次接触 Python 数据科学环境，建议选择 **Anaconda Distribution**，可以省去很多配置麻烦。","（2）图 1-2 中同样还可以看到三个系统的选项，**Windows**、**macOS**、**Linux**。根据自己设备的操作系统和芯片架构选择对应版本即可。","（1）双击下载好的 `Anaconda3-x.x.x-Windows-x86_64.exe`，点击 `Next`。","> 不要把 Anaconda 安装在带有中文或空格的路径下，例如 `C:\\Program Files` 或带中文用户名的目录，容易导致后续路径解析问题。","**License Agreement**：勾选同意协议，点击 `Next`。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"conda 25.11.0","goals":["理解「环境准备」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-002","moduleId":"foundation","title":"初级分词技术","level":"入门","order":3,"concepts":["初级分词技术","一、分词的定义与重要性","二、通过 jieba 认识分词","jieba 安装","基于规则与词典","Token","Transformer"],"structure":["一、分词的定义与重要性","二、通过 jieba 认识分词","jieba 安装","基于规则与词典","Log 概率与动态规划"],"body":["要让计算机开始理解人类语言，首先要做的就是把连续不断的文本“敲碎”，变成一块块有意义的“积木”——这个过程就是**分词（Tokenization）**。如果说文本是一座宏伟的建筑，那么“词”就是构成这座建筑的砖瓦。分词任务的质量，将决定上层建筑（如信息检索、机器翻译、情感分析等）的稳固程度。","**分词**的任务，是把连续的文本序列切分成具有独立语义的基本单元（即“词”或“词元”）。对于英文等天然有空格作为分隔符的语言，分词相对简单。但对于中文、日文、泰文等语言，文本是连续的字符流，词之间没有明确的边界。例如，对于句子`\"给阿姨倒一杯卡布奇诺\"`，计算机需要依据算法将其正确地切分为 `[\"给\", \"阿姨\", \"倒\", \"一杯\", \"卡布奇诺\"]`。","诚然，在以 Transformer 为基础的大语言模型兴起后，传统意义上“语言学分词”的应用场景在逐步减少，现代大语言模型更多采用子词（Subword）等切分策略。但 `jieba` 作为一个经典、简单、代码开源的中文分词库，仍是**理解传统分词思想、学习 NLP 基础工程实践**的重要工具 。","`jieba` 是目前流行的 Python 中文分词库之一，对初学者较为友好，可以使用如下 `pip` 命令安装。不过，在安装之前不要忘了用 `conda activate 大模型基础课程` 激活虚拟环境。","在实际工程中，将大量小于 1 的概率值直接相乘，很容易导致结果趋近于 0，造成**浮点数下溢**，无法比较路径优劣。为此，`jieba` 采用了**对数概率**技术，利用对数函数 `log` 的性质，将概率的**累乘**转换为 `log` 概率的**累加**。寻找概率最大值就等价于寻找 `log` 概率之和的最大值，有效避免了下溢问题。其数学形式如下："],"formula":"其中，每个词 $w_i$ 的概率 $P(w_i)$ 可以通过其在词典（语料库）中的频率来估算：","code":"pip install jieba","goals":["理解「初级分词技术」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-003","moduleId":"foundation","title":"词向量表示","level":"入门","order":4,"concepts":["词向量表示","一、为什么需要词向量？","二、离散表示","独热编码","余弦相似度计算","Token","Embedding"],"structure":["一、为什么需要词向量？","二、离散表示","独热编码（One-Hot Encoding）","余弦相似度计算","不同统计方式","TF-IDF"],"body":["在深度学习普及之前，研究者们提出了多种将词语表示为固定向量的方法。这些方法通常将每个词视为一个独立的、不可再分的单元，生成的向量因此也被称为**离散向量（Discrete Vector）**。其特点是维度高且稀疏，在机器学习领域应用广泛。","vec(文档1) = vec(我) + vec(先) + vec(挣) + vec(一个) + vec(亿) = [1, 1, 1, 0, 1, 1]","vec(文档2) = vec(我) + vec(挣) + vec(它) + vec(一个) + vec(亿) = [1, 0, 1, 1, 1, 1]","这个结果中向量的每一维，代表对应词典中的词在该文档中出现的次数。通过计算两个向量的距离（如余弦相似度），可以发现这两个文档是比较相似的，因为它们共享了\"我\"、\"挣\"、\"一个\"、\"亿\"这几个词。","**余弦相似度（Cosine Similarity）**通过计算两个向量夹角的余弦值来衡量它们的相似性。对于非负向量（如词袋模型产生的向量），其值范围在 `[0, 1]` 之间，值越接近`1`，表示两个向量越相似。公式如下：","**计算点积 A · B**：$(1 \\times 1) + (1 \\times 0) + (1 \\times 1) + (0 \\times 1) + (1 \\times 1) + (1 \\times 1) = 1 + 0 + 1 + 0 + 1 + 1 = 4$"],"formula":"\\text{similarity} = \\cos(\\theta) = \\frac{\\mathbf{A} \\cdot \\mathbf{B}}{||\\mathbf{A}|| \\cdot ||\\mathbf{B}||} = \\frac{\\sum_{i=1}^{n} A_i B_i}{\\sqrt{\\sum_{i=1}^{n}","code":"\"我\" -> [1, 0, 0, 0, 0, 0] \"先\" -> [0, 1, 0, 0, 0, 0] \"挣\" -> [0, 0, 1, 0, 0, 0] \"它\" -> [0, 0, 0, 1, 0, 0] \"一个\" -> [0, 0, 0, 0, 1, 0] \"亿\" -> [0, 0, 0, 0, 0, 1]","goals":["理解「词向量表示」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-004","moduleId":"foundation","title":"从主题模型到 Word2Vec","level":"入门","order":5,"concepts":["从主题模型到 Word2Vec","一、寻找理想的词向量","二、主题模型","SVD 矩阵分解","主题模型的局限性","Embedding","Word2Vec"],"structure":["一、寻找理想的词向量","二、主题模型","SVD 矩阵分解","主题模型的局限性","三、Word2Vec","Word2Vec 概述","可学习的词向量矩阵"],"body":["为实现这一目标，研究者们探索了不同的技术路径。其中一条是基于**全局文档统计**的**主题模型**。另一条是后来居上、并成为主流的、基于**局部上下文预测**的**神经网络模型**。作为早期探索的代表，**主题模型**利用全局统计初步实现了语义捕捉，而随后的 **Word2Vec** 则通过全新的局部预测范式，真正释放了分布式表示的强大威力。","如图 2-2 所示，该方法将获取词向量的过程，巧妙地转化成了一个矩阵分解问题。具体步骤如下：","（1）**构建“词-文档”矩阵**：首先，我们需要以整个语料库为基础，构建一个巨大的**词-文档矩阵 $X$**。这个矩阵的每一行代表一个词，每一列代表一篇文档，矩阵中 $X(i, j)$ 的值是词 $i$ 在文档 $j$ 中的重要性权重，可以使用 **TF-IDF** 值来填充。这个矩阵通常是**巨大且高度稀疏**的。","（2）**矩阵分解**：从线性代数的角度看，这个巨大的稀疏矩阵 $X$ 可以被近似分解为两个更小的、更稠密的矩阵的乘积。最常用的分解技术之一是 **奇异值分解（SVD）**。","与主题模型从全局文档统计中挖掘主题不同，由 Google 在 2013 年提出的 Word2Vec 算法 ，将视角聚焦于词语的**局部上下文**。它的思想来源于语言学中的**分布式假设，即一个词的含义，由其上下文中的词语所决定** 。换言之，如果两个词的上下文经常是相似的，那么这两个词的语义就是相近的。Word2Vec 正是这一思想的数学实现。","$X_{m \\times n}$ 是原始的词-文档矩阵， $m$ 是词典大小， $n$ 是文档数量。"],"formula":"X_{m \\times n} \\approx W_{topic\\, m \\times k} \\times H_{topic\\, k \\times n} \\tag{2.10}","code":"","goals":["理解「从主题模型到 Word2Vec」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-005","moduleId":"foundation","title":"基于 Gensim 的词向量实战","level":"入门","order":6,"concepts":["基于 Gensim 的词向量实战","一、Gensim 简介","核心概念","内置算法与安装","Step 1","Token","Word2Vec"],"structure":["一、Gensim 简介","核心概念","内置算法与安装","Step 1: 准备分词后的语料 (新闻标题)","三、TF-IDF与关键词权重",". 准备语料","五、Word2Vec 模型实战"],"body":["前面已经学习了多种词向量表示，接下来我们尝试将这些理论转化为可运行的代码。本节将使用 **Gensim** 进行实践，通过简洁的代码示例应用前几节介绍的算法，加深对模型工作原理的理解，并掌握其基本使用方法。","**Gensim (Generate Similar)** 是一个功能强大且高效的Python库，专门用于处理原始的、非结构化的纯文本文档。它内置了多种主流的词向量和主题模型算法，如 Word2Vec、TF-IDF、LSA、LDA 等。","如果还没安装 `gensim`，直接使用如下 `pip` 命令即可安装：","tokenized_headlines = [jieba.lcut(doc) for doc in raw_headlines]","分词后语料: [['央行', '降息', '，', '刺激', '股市', '反弹'], ['球队', '赢得', '总决赛', '冠军', '，', '球员', '表现出色']]","**词典**：这是一个将词语（token）映射到唯一整数ID的**词汇表**。在使用词袋模型之前，必须先根据整个语料库构建一个词典。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"pip install gensim","goals":["理解「基于 Gensim 的词向量实战」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-006","moduleId":"foundation","title":"循环神经网络","level":"入门","order":7,"concepts":["循环神经网络","一、如何处理序列信息？","简单方法的局限性","二、引入“记忆”的 RNN","RNN 结构","Token","Embedding"],"structure":["一、如何处理序列信息？","简单方法的局限性","二、引入“记忆”的 RNN","RNN 结构","三、RNN 工作原理解析","文本分类示例","从静态到动态的飞跃"],"body":["> 在处理序列数据（如文本）时，模型按顺序逐个处理序列中的元素（如词元）。**时间步**就是这个处理过程中的一个离散步骤。在文本处理的上下文中，**一个时间步通常对应于处理一个词元**。例如，对于句子“播放周杰伦的歌”，处理“播放”是时间步 1，处理“周杰伦”是时间步 2，以此类推。","这种最基础的 RNN 结构通常被称为**简单循环神经网络（Simple Recurrent Network，SRN）**或 **Elman Network** 。如图 3-1 展示了 RNN 单元在单个时间步内的计算流程。需要注意，为了可视化，此图将隐藏状态拆分成了两个部分（`Hidden State` 和 `Hidden Layer`），但在计算上它们是紧密关联的。","可以将图中的流程分解如下，并与公式 $h_t = \\tanh(U x_t + W h_{t-1} + b)$ 对应起来：","（1）**输入（$x_t$）**: 左侧的 `Input` 块代表当前时间步的输入向量 $x_t$。它通过权重矩阵 $U$ 连接到隐藏层（图中的蓝色虚线），对应公式中的 $U x_t$ 部分。","（2）**前一时刻的隐藏状态（$h_{t-1}$）**: 紫色的 \"Hidden State\" 块（图中用 $s$ 表示）代表了来自**上一个时间步**的记忆，即 $h_{t-1}$。它通过循环权重矩阵 $W$ 连接到隐藏层（图中的橙色虚线），对应公式中的 $W h_{t-1}$ 部分。","`input_size`（$E$）: 输入特征 $x_t$ 的维度。在 NLP 中，这通常是词嵌入的维度 `embedding_dim`。"],"formula":"h_t = \\tanh(U x_t + W h_{t-1}) \\tag{3.1}","code":"import numpy as np # (B, T, E, H) 分别表示 批次/序列长度/输入维度/隐藏维度 B, E, H = 1, 128, 3 def prepare_inputs(): \"\"\" 使用 NumPy 准备输入数据 使用示例句子: \"播放 周杰伦 的 《稻香》\"","goals":["理解「循环神经网络」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-007","moduleId":"foundation","title":"LSTM 与 GRU","level":"入门","order":8,"concepts":["LSTM 与 GRU","一、LSTM 与门控机制","从单一状态到双轨并行","门的结构","二、LSTM 单元结构","RNN","LSTM"],"structure":["一、LSTM 与门控机制","从单一状态到双轨并行","门的结构","二、LSTM 单元结构","第一步：遗忘门（Forget Gate）","第二步：输入门与候选记忆（Input Gate & Candidate Memory）","第三步：更新细胞状态 (Cell State Update)"],"body":["在了解了 RNN 的基本架构及其固有的缺陷后，本节将探讨两种经典的 RNN 改进方案——长短期记忆网络 (LSTM) 与门控循环单元 (GRU)，并剖析它们是如何通过精巧的结构设计来克服长距离依赖这一挑战的。","与 RNN 只有一个隐藏状态 $h_t$ 在时间步之间传递不同，LSTM 引入了两个独立的状态向量在时间轴上并行传递：","（1）**细胞状态（Cell State, $c_t$）**: 这是 LSTM 的核心，原始论文中称之为 **“恒定误差旋转木马”（Constant Error Carousel, CEC）**。可以把它想象成一条“信息高速公路”或“传送带”，负责在整个序列中传递**长期记忆**。信息可以直接在这条传送带上流动，仅经过按元素的加权与相加，没有额外的矩阵连乘，从而极大地缓解了梯度消失问题。","（2）**隐藏状态（Hidden State, $h_t$）**: 与 RNN 中的隐藏状态类似，代表了当前时间步的**短期记忆**和**最终输出**。$h_t$ 的计算依赖于当前的细胞状态 $c_t$。","LSTM 通过门控单元，来控制细胞状态 $c_t$ 这条“高速公路”在每个时间点应该**遗忘**什么旧内容，以及应该**写入**什么新内容。","每一个 `σ` （Sigmoid） 符号都对应一个**门**的计算，即遗忘门、输入门和输出门。"],"formula":"f_t = \\sigma(W_f \\cdot [h_{t-1}, x_t] + b_f) \\tag{3.7}","code":"def manual_lstm_numpy(x_np, weights): U_f, W_f, U_i, W_i, U_c, W_c, U_o, W_o = weights B_local, T_local, _ = x_np.shape h_prev = np.zeros((B_local, H), dtype=np.float32) c_prev = np.zeros((B_local, H), dtype=np.float32) steps = [] # 按时间步循环","goals":["理解「LSTM 与 GRU」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-008","moduleId":"foundation","title":"Seq2Seq 架构","level":"入门","order":9,"concepts":["Seq2Seq 架构","一、Seq2Seq 详解","从自编码器到 Seq2Seq","整体架构","实现细节与考量","Token","Embedding"],"structure":["一、Seq2Seq 详解","从自编码器到 Seq2Seq","整体架构","实现细节与考量","二、训练与推理模式","教师强制","自回归"],"body":["前面我们已经学习了如何使用 RNN 和 LSTM 处理序列数据。这些模型在三类任务中表现出色：","> 此处将“人工智能”视为单个单元仅为方便举例，旨在说明输入与输出序列长度可能不等的概念，不代表严格的分词标准。","对于这类问题，简单的 RNN 或 LSTM 架构难以胜任。为了解决这一挑战，2014年，研究者们提出了**序列到序列（Sequence-to-Sequence, Seq2Seq）** 架构，它成功地将一种通用的**编码器-解码器（Encoder-Decoder）** 架构应用于序列转换任务 。该架构一经提出，便在机器翻译、文本摘要、对话系统等领域取得了巨大成功。","Seq2Seq 架构借鉴了自编码器的结构，但对其核心目标进行了关键的**泛化**：它不再要求解码器的输出与编码器的输入相同，而是要生成一个全新的、与输入语义相关的**目标序列**。","> 解码器在生成序列时，是按照从左到右的顺序逐词生成的，它在预测当前词元时不能“看到”未来的词元。为满足因果性约束，解码器通常使用单向 RNN（或采用因果掩码的解码结构）。","**多对一（Many-to-One）**：将整个序列信息压缩成一个特征向量，用于文本分类、情感分析等任务。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"class Encoder(nn.Module): def __init__(self, vocab_size, hidden_size, num_layers): super(Encoder, self).__init__() self.embedding = nn.Embedding( num_embeddings=vocab_size, embedding_dim=hidden_size )","goals":["理解「Seq2Seq 架构」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-009","moduleId":"foundation","title":"注意力机制","level":"入门","order":10,"concepts":["注意力机制","一、注意力机制的设计原理","二、注意力机制的动机与推导","问题的根源与固定对齐策略的局限","注意力机制的动态加权原理","Embedding","RNN"],"structure":["一、注意力机制的设计原理","二、注意力机制的动机与推导","问题的根源与固定对齐策略的局限","注意力机制的动态加权原理","如何确定权重？","三、注意力机制详解","注意力计算三部曲"],"body":["在上一节的结尾，讨论了标准 Seq2Seq 架构存在的一个核心缺陷：**信息瓶颈**。编码器需要将源序列的所有信息，不论长短，全部压缩成一个固定长度的上下文向量 $C$。这种机制在处理长序列时，很容易丢失序列开头的关键信息，同时也无法让解码器在生成不同词元时，有选择性地关注输入的不同部分。用上一节提到的对联任务举例，当上联是“两个黄鹂鸣翠柳”时，期望模型在生成下联时：","但是标准的 Seq2Seq 架构的模型在生成“一行”、“白鹭”、“上青天”的每一个词时，所依赖的都是**同一个、包含了整个上联概要**的上下文向量 $C$。模型缺乏一种动态的、有倾向性的“关注”能力。为了解决这个问题，**注意力机制 (Attention Mechanism)** 被提出。","注意力机制的原理，可以通俗地理解为从“一言以蔽之”到“择其要者而观之”的转变。人类在进行阅读理解或翻译时，并不会将整个句子或段落的信息平均地记在脑海里。当回答特定问题或翻译特定词组时，我们的注意力会自然地聚焦到原文中的相关部分。","为了更直观地理解注意力机制的必要性，可以跟随一个逐步深入的思路。标准的 Seq2Seq 模型之所以表现不佳，根源是它试图将源序列的所有信息**无差别**地压缩进一个向量。但在对联这类任务中，输入和输出之间存在着明显的**局部对应关系**。一个直观的想法是能不能建立一种固定的对齐策略？例如，在生成下联第一个词时，就只使用上联第一个词的编码信息。生成第二个词时，就只用第二个词的信息，以此类推。这个想法可以表示为：","这种方法在处理像对联这样长度相等、词序对应的“特例”时似乎是可行的，但它的局限性非常明显。它不仅要求序列等长，导致像中英文翻译这样不等长的任务中一对一映射立刻失效，而且假设了输入和输出的对齐关系是固定不变的，难以应对实际任务中如一对多或多对一的复杂对应关系。这种固定对齐策略过于理想化且缺乏通用性，所以我们需要一种更灵活、更具普适性的方法。","生成第一个词“一行”时，主要关注上联的“两个”。"],"formula":"C_t = \\sum_{j=1}^{T_x} \\alpha_{tj} h_j","code":"class Encoder(nn.Module): def __init__(self, vocab_size, hidden_size, num_layers): super(Encoder, self).__init__() self.embedding = nn.Embedding( num_embeddings=vocab_size, embedding_dim=hidden_size )","goals":["理解「注意力机制」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-010","moduleId":"foundation","title":"深入解析 Transformer","level":"入门","order":11,"concepts":["深入解析 Transformer","一、自注意力机制","自注意力与交叉注意力的区别","自注意力的计算过程","矩阵运算与并行化","Token","Embedding"],"structure":["一、自注意力机制","自注意力与交叉注意力的区别","自注意力的计算过程","矩阵运算与并行化","PyTorch 实现自注意力","二、多头注意力机制","PyTorch 实现多头注意力"],"body":["注意力机制通过动态加权的方式，克服了传统 Seq2Seq 模型中的“信息瓶颈”问题。但是，这些模型依然依赖于 RNN 来处理序列信息，也就是说它们必须按顺序，一个词元接一个词元地进行计算，这在处理长序列时效率低下，并且存在长距离依赖信息丢失的问题。","举个例子，在句子“苹果公司发布了新款手机，**它**采用了最新的芯片”中，要理解代词“它”指的是“新款手机”而不是“苹果公司”，模型就需要将“它”与句子中的其他词元进行关联。自注意力机制正是通过计算“它”对句中其他所有词的注意力权重来实现这一点的。","从结构上看，自注意力与交叉注意力的区别在于**信息的来源和流动方向**。在交叉注意力机制中，信息在两个不同的序列之间流动。通常，**Query** 来自解码器（代表当前的目标序列状态），而 **Key** 和 **Value** 来自编码器的所有输出（代表完整的源序列信息）。其目的是在生成目标序列的每一步时，从源序列中寻找最相关的信息。","而在**自注意力**机制中，信息则是在**同一个序列内部**进行流动和重组。它的 **Query, Key, 和 Value 都来自同一个输入序列**。其目的是为了捕捉输入序列内部的依赖关系，重新计算序列中每个词元的表示，使其包含更丰富的上下文信息。","总结来说，尽管底层的加权求和计算方式相似，但两者在架构上的目标完全不同：","**交叉注意力**：用于**对齐**和**整合**两个**不同**序列之间的信息。"],"formula":"q_i = x_i W^Q \\\\ k_i = x_i W^K \\\\ v_i = x_i W^V","code":"graph LR subgraph Encoder A[源序列] --> B[编码器输出 K, V]; end subgraph Decoder C[目标序列] --> D[解码器状态 Q]; end","goals":["理解「深入解析 Transformer」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-011","moduleId":"foundation","title":"BERT 结构及应用","level":"入门","order":12,"concepts":["BERT 结构及应用","一、BERT 的设计原理与预训练","二、BERT 架构详解","BERT 的模型规模","BERT 的输入表示","Token","Embedding"],"structure":["一、BERT 的设计原理与预训练策略","二、BERT 架构详解","BERT 的模型规模","BERT 的输入表示","特殊词元","三、BERT 的预训练任务","任务一：掩码语言模型 (Masked Language Model, MLM)"],"body":["（1）**预训练**：在一个庞大的、通用的文本语料库（如维基百科、书籍）上，通过特定的无监督任务来训练一个深度神经网络模型。这个阶段的目标不是为了完成某个具体的 NLP 任务，而是让模型学习语言本身的规律，比如语法结构、词语间的语义关系、上下文依赖等。训练完成后，就得到了一个包含了丰富语言知识的、参数已经训练好的**预训练模型**。","这种“**预训练 + 微调**”的训练范式，属于**迁移学习**的一种实现，也是 BERT 的训练框架。它能够从海量数据中学到的通用语言知识，迁移到数据量有限的特定任务中。","> 你可能会有疑问：像 Bi-LSTM 这样的循环神经网络不是也能捕捉上下文信息，生成动态词向量吗，为什么还需要 BERT？","> 虽然目标相似，但实现方式和效果却有很大的差别。Bi-LSTM 的“双向”本质上是两个独立的单向 RNN（一个正向，一个反向）的**浅层拼接**。在计算过程中，正向 RNN 并不知道未来的信息，反向 RNN 也不知道过去的信息。","> 而 BERT 基于 Transformer 的**自注意力机制**，实现了**真正的“深度双向”**。也就是上一节中所学到的，自注意力机制使模型的每一层，计算任何一个词的表示时，都能**同时与序列中的所有其他词直接交互**。这种全局视野让 BERT 能够捕捉到比 RNN 更复杂、更长距离的依赖关系，并且其并行计算的特性也远比 RNN 的串行结构高效。可以说，BERT 实现了 RNN 想要达到但未能完美实现的目标。","**80% 的情况**：将选中的词元替换为 `[MASK]` 标记。例如 `My [MASK] is a good stu`。这是最核心的操作，强制模型利用上下文信息来预测被“挖空”的词。"],"formula":"Input_{embedding} = Token_{embedding} + Position_{embedding} + Segment_{embedding}","code":"pip install transformers","goals":["理解「BERT 结构及应用」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-012","moduleId":"foundation","title":"GPT 结构及应用","level":"入门","order":13,"concepts":["GPT 结构及应用","一、GPT 的设计思想与技术发展","因果语言模型","从微调到提示","二、GPT 架构解析","Token","Embedding"],"structure":["一、GPT 的设计思想与技术发展","因果语言模型","从微调到提示","二、GPT 架构解析","模型基本结构","关键架构演进","GPT 与 BERT 的主要差异"],"body":["与 BERT 类似，早期的 GPT 也遵循 **“预训练 + 微调”** 的思路。不过，随着模型规模的指数级增长（尤其是到了 GPT-3），**提示（Prompt）** 和**上下文学习（In-context Learning, ICL）** 开始成为主流，允许用户在不更新参数的情况下完成任务。虽然现代大模型依然会使用微调，但目的和形式已与 BERT 时代针对特定任务的微调有了本质不同。","GPT 的成功根植于一个非常简洁而强大的预训练任务——**因果语言模型 (Causal Language Model, CLM)**。通俗地讲，就是 **预测下一个词**。给定一段文本序列 $x_1, x_2, ..., x_t$，模型的目标是最大化预测出下一个词元 $x_{t+1}$ 的概率。它在预训练过程中，不断地在海量文本上重复这个“续写”任务。","这个看似简单的目标，却迫使模型必须学习到语言的深层规律，包括语法结构、事实知识、上下文逻辑关系等，因为只有真正“理解”了前面的内容，才能准确地预测后面会说什么。由于在预测第 `t` 个词时，模型只能看到它前面的 `t-1` 个词，这种单向的、自回归的特性是 GPT 与 BERT 最根本的区别。","（1）**GPT-1：有监督微调（Supervised Fine-tuning）**","（2）**GPT-2：零样本学习（Zero-shot Learning）**"],"formula":"P(x_1, ..., x_T) = \\prod_{t=1}^{T} P(x_t | x_1, ..., x_{t-1})","code":"import torch from transformers import AutoTokenizer, AutoModelForCausalLM # 1. 环境配置 device = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\") model_name = \"gpt2\" tokenizer = AutoTokenizer.from_pretrained(model_name) model = AutoModelForCausalLM.from_pretrained(model_name).to(device)","goals":["理解「GPT 结构及应用」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-013","moduleId":"foundation","title":"T5 结构及应用","level":"入门","order":14,"concepts":["T5 结构及应用","一、万物皆文本的核心理念","提示词的先驱与多任务平衡","独特的预训练目标 Span Co","二、T5 架构解析","Token","Embedding"],"structure":["一、万物皆文本的核心理念","提示词的先驱与多任务平衡","独特的预训练目标 Span Corruption","二、T5 架构解析","回归经典的模型结构","关键技术改进",". 相对位置编码"],"body":["在前两节中，我们分别学习了基于 **Encoder** 的 BERT（擅长理解）和基于 **Decoder** 的 GPT（擅长生成）。那 Transformer 最原始的 **Encoder-Decoder** 结构去哪了？","本节的主角 **T5 (Text-to-Text Transfer Transformer)** 回归了这一经典架构。BERT 擅长**理解**（如分类、实体识别），GPT 擅长**生成**（如续写、对话），而 T5 则试图在**输入输出形式**上寻找一种通解。如图 5-5，它将所有 NLP 任务都视为 **“文本到文本” (Text-to-Text)** 的转换问题，以此来统一处理理解与生成任务。","在 **BERT 模式**下，针对不同的任务，我们需要设计不同的模型结构：","Google 提出的 T5 模型打破了这种模式。它提出——**无论是什么任务，输入是文本，输出也是文本**。我们以《黑神话：悟空》的评论处理为例：","为了让同一个模型能够区分不同的任务，T5 引入了 **Task Prefix (任务前缀)** 的概念。例如，在做翻译时，我们在输入文本前加上 `翻译成英文:`；在做摘要时，加上 `摘要:`。","**文本分类**：BERT + 全连接层（分类头）。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"import torch from transformers import T5Tokenizer, T5ForConditionalGeneration # 1. 加载模型 model_name = \"t5-small\" # 使用最小版本演示 tokenizer = T5Tokenizer.from_pretrained(model_name) model = T5ForConditionalGeneration.from_pretrained(model_name) # 2. 准备输入","goals":["理解「T5 结构及应用」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-014","moduleId":"foundation","title":"Hugging Face 生态与核心库","level":"入门","order":15,"concepts":["Hugging Face 生态与","一、Hugging Face 生","二、Transformers 核","开箱即用的 Pipeline","图像分类示例","Token","Embedding"],"structure":["一、Hugging Face 生态全景","二、Transformers 核心库详解","开箱即用的 Pipeline","图像分类示例（显式指定小模型 apple/mobilevit-small）","pip install pillow","AutoClass：智能加载机制","核心组件拆解"],"body":["对于刚接触 AI 的开发者，或者只想快速验证某个想法，**Pipeline** 是最高效的工具。它将**预处理 -> 模型推理 -> 后处理**这一复杂的全流程封装成了一个黑盒。它的使用场景非常广泛，以下面两个为例：","（1）**NLP 任务**：在前面的 GPT 实战中，我们曾显式指定模型（`model=\"gpt2\"`）来完成文本生成。同时，Pipeline 还拥有强大的“自动导航”能力，它**无需指定模型，只需指定任务**。当指定一个任务类型（如 `sentiment-analysis`）时，Pipeline 会自动从 Hub 上下载并加载该任务对应的**默认预训练模型**。","vision_classifier = pipeline(model=\"apple/mobilevit-small\")","Transformers 的处理流程主要包含三个核心阶段。我们将结合代码演示，分析每个阶段的职责与实现：","Tokenizer 充当数据的“翻译官”，负责将原始文本转换为模型可理解的数字序列（如 Input IDs 和 Attention Mask）。它利用 Rust 实现的 Fast Tokenizer 技术，在处理海量语料时比纯 Python 实现快几个数量级。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"from transformers import pipeline # 情感分析（默认下载英文模型） classifier = pipeline(\"sentiment-analysis\") result = classifier(\"I love Hugging Face!\") result","goals":["理解「Hugging Face 生态与核心库」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-015","moduleId":"foundation","title":"手搓一个大模型","level":"入门","order":16,"concepts":["手搓一个大模型","一、Llama2 架构总览","二、关键组件详解","预归一化","旋转位置编码","Token","Embedding"],"structure":["一、Llama2 架构总览","二、关键组件详解","预归一化","旋转位置编码","将 Q/K 向量视为复数","code/C6/llama2/src/rope.py","准备参数和输入"],"body":["与原始 Transformer 解码器相比，Llama2 及其同类模型进行了一系列改进，以提升性能和训练稳定性。它的数据流可以概括为：","（2）**N x Transformer 层堆叠**：数据依次通过 N 个相同的 Transformer Block。","（3）**最终归一化与输出**：在所有层之后，进行最后一次 RMSNorm，并通过一个线性层将特征映射到词汇表 logits。","下面，我们将根据图 6-1 中 Llama2 的结构顺序，从输入端开始，逐一实现其核心组件。","在接口定义方面，输入是一个形状为 `[batch_size, seq_len, dim]` 的张量 `x`，输出是与输入形状相同的张量，其中每个词元（`dim` 维度）都会被独立归一化。","**预归一化**：在进入子层之前，先进行一次 RMSNorm。"],"formula":"y = \\frac{x}{\\sqrt{\\frac{1}{n}\\sum_{i=1}^{n}x_i^2 + \\epsilon}} \\cdot \\gamma","code":"# code/C6/llama2/src/norm.py class RMSNorm(nn.Module): def __init__(self, dim: int, eps: float = 1e-6): super().__init__() self.eps = eps self.weight = nn.Parameter(torch.ones(dim)) # 对应公式中的 gamma def _norm(self, x: torch.Tensor) -> torch.Tensor:","goals":["理解「手搓一个大模型」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-016","moduleId":"foundation","title":"MoE 架构解析","level":"入门","order":17,"concepts":["MoE 架构解析","一、MoE 的来龙去脉","自适应局部专家混合","干扰效应与分治思想","损失函数设计","Token","LSTM"],"structure":["一、MoE 的来龙去脉","自适应局部专家混合","干扰效应与分治思想","损失函数设计","深度神经网络中的 MoE","从浅层到深层的变革","学习分解的特征表示"],"body":["我们在上一节详细解析了 Llama2 的架构。像 Llama2、GPT-3 这样的模型，通常被称为**稠密模型（Dense Model）**。这意味着，对于每一个输入的 Token，模型中**所有的**参数（从第一层到最后一层）都会参与计算。","但是，随着模型规模向万亿级别迈进，全量参数计算带来的算力成本变得不可承受。这就引出了本节的主角——**混合专家模型（Mixture of Experts, MoE）**。MoE 技术通过一种 **“稀疏激活”** 的机制，兼具了大规模参数的知识容量与极低的推理成本。Mistral 8x7B 等模型的出现，更是证明了 MoE 在开源大模型领域的巨大潜力，使其成为当前最受关注的技术方向之一。","最早的 MoE 思想可以追溯到 1991 年 Michael Jordan 和 Geoffrey Hinton 发表的经典论文《Adaptive Mixture of Local Experts》 。这篇论文不仅提出了分治的架构，更重要的是从理论层面解决了神经网络在多任务学习中的根本性难题。","在传统的单体神经网络中，如果我们尝试让一个网络同时学习多个截然不同的子任务（例如既学做菜又学修车），往往会出现**“强干扰效应（Strong Interference Effects）”**。这是因为网络的所有权重都参与了所有任务的计算，当网络调整参数以适应任务 A 时，可能会破坏它在任务 B 上已经学到的特征表示。从而导致学习速度变慢，泛化能力变差。","为了解决这个问题，论文提出了一种基于**“分治（Divide and Conquer）”**策略的系统架构：","**专家网络**：系统包含多个独立的神经网络（可以是简单的前馈网络）。每个专家不再需要处理全局任务，只需专注于输入空间中的一个局部区域或一类特定的子任务。"],"formula":"在这种合作模式下，为了减小总误差，每个专家都会试图去弥补其他专家的残差。继而导致每个案例都牵动所有专家的权重，依然无法解决“干扰效应”。为了实现解耦，作者提出将系统视为一个随机生成器，并采用**负对数似然**作为目标函数：","code":"# code/C6/MoE/src/ffn.py # ... (保留原有的 FeedForward 类) class MoE(nn.Module): def __init__(self, dim: int, hidden_dim: int, multiple_of: int, ffn_dim_multiplier: Optional[float], num_exper super().__init__() self.num_experts = num_experts self.top_k = top_k","goals":["理解「MoE 架构解析」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-017","moduleId":"foundation","title":"手撕大模型生成策略","level":"入门","order":18,"concepts":["手撕大模型生成策略","一、“逐 token 生成”在做","从 Pipeline 入手调试准","Pipeline 接口的输入与输","分析解码流程","Token","Attention"],"structure":["一、“逐 token 生成”在做什么","从 Pipeline 入手调试准备","Pipeline 接口的输入与输出结构","分析解码流程","参考资料"],"body":["重新打开在第五章中实现的 GPT 实战代码，如图 6-16 注释掉其他内容，只保留文件最后的 `# pipeline 应用` 的部分以及相关初始化变量。具体调试方法可以参考第八章 NER 项目的数据处理中的简单说明。","（1）在 `pipeline_outputs = generator(...)` 这一行打断点。Debug 运行脚本，程序停住后，点击**步入（Step Into）**，如图 6-17 我们就进入 Transformers 包内部代码。","> 可以看到图中源码的猫咪 emoji（🐈 🐈 🐈）。Hugging Face 的三位创始人都是法国人，而在法语中 “chat” 就是猫的意思，所以工程师用它暗示这里有“一堆 chats（猫）”。哈哈，极客幽默。","> 调试器命中断点时通常会停在该行“执行之前”，所以如果某个变量是“在这一行才刚被赋值/更新”的，需要**单步执行一次**或把断点下在**下一行**，才能看到它的最终值。","（3）断点下好后，点击 **恢复程序（Continue / Resume）**，程序会依次停在这四个位置。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"GenerationConfig { \"bos_token_id\": 50256, \"do_sample\": true, \"eos_token_id\": 50256, \"max_length\": 50, \"max_new_tokens\": 256, \"temperature\": 0.7","goals":["理解「手撕大模型生成策略」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-018","moduleId":"foundation","title":"上下文学习与提示词技术","level":"入门","order":19,"concepts":["上下文学习与提示词技术","一、零样本与少样本机制","零样本学习","思维树","专用推理模型","Token","Transformer"],"structure":["一、零样本与少样本机制","零样本学习","思维树","专用推理模型","参考文献"],"body":["**零样本学习（Zero-Shot Learning）**是指在提示词中仅提供任务指令和待处理的输入内容，而不提供任何预期输出的参考示例。大语言模型凭借预训练阶段积累的广博知识，直接对未见过的任务进行处理。以常见的情感分析任务为例，下面是在没有任何示例的情况下让模型判断文本情感倾向的典型设定：","单样本学习在大多数常规规范任务中表现良好，但是如果面临的任务比较复杂、反直觉或高度定制化时，它的效果就捉襟见肘了。比如，我们加上一条极其违背常规语言习惯的规则，将情感词倒序输出（“正面”输出“面正”，“负面”输出“面负”）：","如图 6-39 所示，未经过深层推理特化的大模型往往会被表面的“距离近应该走路”逻辑误导，给出一个“抽象”的建议。","如果我们尝试在提示词末尾加上要求逐步思考的“魔法咒语”，会发现一个有意思的情况。","我想洗车，洗车店离我家 50 米。我应该开车去还是走路去？Let's think step by step","**生成候选**：在当前步骤生成多种可能的下一步解法方向。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"阅读以下评论，并判断一下评论表达的情感： 评论：这部电影的剧情有些拖沓。 情感：","goals":["理解「上下文学习与提示词技术」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-019","moduleId":"foundation","title":"大模型课程","level":"入门","order":20,"concepts":["模型下载","PDF 版本下载","💡 如何学习","🤝 如何贡献","🙏 致谢","Token","Transformer"],"structure":["模型下载","PDF 版本下载","💡 如何学习","🤝 如何贡献","🙏 致谢","核心贡献者","特别感谢"],"body":["> 第六章正文已覆盖 Pretrain、SFT 与 PEFT 等核心训练流程，建议结合 第六章实践说明 与 学习与环境准备 一起阅读；偏好对齐可以继续参考 第六章补充专题。","&emsp;&emsp;***本 大模型课程 PDF 教程完全开源免费。为防止各类营销号加水印后贩卖给大模型初学者，我们特地在 PDF 文件中预先添加了不影响阅读的 开源学习社区 开源标志水印，敬请谅解～***","&emsp;&emsp;本项目适合大学生、研究人员、LLM 爱好者。在学习本项目之前，建议具备一定的编程经验，尤其是要对 Python 编程语言有一定的了解。最好具备深度学习的相关知识，并了解 NLP 领域的相关概念和术语，以便更轻松地学习本项目。","&emsp;&emsp;如果你计划复现章节代码，建议先阅读 学习与环境准备。仓库按章节拆分依赖，不同章节建议使用独立的 Python 环境，以减少版本冲突。","&emsp;&emsp;在阅读本书的过程中，建议你将理论和实际相结合。LLM 是一个快速发展、注重实践的领域，我们建议你多投入实战，复现本书提供的各种代码，同时积极参加 LLM 相关的项目与比赛，真正投入到 LLM 开发的浪潮中。我们鼓励你关注 开源学习社区 及其他 LLM 相关开源社区，当遇到问题时，你可以随时在本项目的 issue 区提问。","🐛 **报告 Bug** - 发现问题请提交 Issue"],"formula":"学习与环境准备 -> 分章依赖、硬件建议与实践入口 -> ✅","code":"","goals":["理解「大模型课程」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-020","moduleId":"foundation","title":"学习与环境准备","level":"入门","order":21,"concepts":["学习与环境准备",". 阅读与实践建议",". 分章环境说明",". 通用准备步骤","Token","Transformer","PEFT"],"structure":[". 阅读与实践建议",". 分章环境说明",". 通用准备步骤"],"body":["大模型课程 以教程阅读为主、代码实践为辅。为了降低环境冲突，建议读者按照章节分别准备依赖，而不是在同一个环境中安装全部依赖。","建议使用 Python 3.10 或 3.11，并为不同章节创建独立虚拟环境。以第六章为例，可以按如下方式准备：","第 1 章到第 4 章以原理学习为主，推荐先完整阅读正文，再选择性复现代码。","第 5 章到第 7 章以实践为主，建议结合章节正文、代码目录和对应依赖一起学习。","如果你的设备资源有限，建议优先复现第 5 章的手写实现，以及第 6 章中的数据处理与单卡调试流程。"],"formula":"章节 -> 主要内容 -> 依赖文件 -> 硬件建议","code":"python -m venv .venv source .venv/bin/activate pip install --upgrade pip pip install -r ./docs/chapter6/code/requirements.txt","goals":["理解「学习与环境准备」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-021","moduleId":"foundation","title":"前言","level":"入门","order":22,"concepts":["前言","写给读者的建议","Transformer","BERT","GPT","RAG","Agent"],"structure":["写给读者的建议"],"body":["2022年底，ChatGPT 的横空出世改变了人们对人工智能的认知，也给自然语言处理（Natural Language Process，NLP）领域带来了阶段性的变革，以 GPT 系列模型为代表的大语言模型（Large Language Model，LLM）成为 NLP 乃至人工智能领域的研究主流。自 2023年至今，LLM 始终是人工智能领域的核心话题，引发了一轮又一轮的科技浪潮。","鉴于此，我们编写了这本结合 LLM 原理及实战的教程。本书将从 NLP 的基本研究方法出发，根据 LLM 的思路及原理逐层深入，依次为读者剖析 LLM 的架构基础和训练过程。同时，我们会结合目前 LLM 领域最主流的代码框架，演练如何亲手搭建、训练一个 LLM，期以实现授之以鱼，更授之以渔。希望读者能从这本书开始走入 LLM 的浩瀚世界，探索 LLM 的无尽可能。","本书包含 LLM 的理论基础、原理介绍和项目实战，全书包括 LLM 及 NLP 的核心思路剖析、公式解析与代码实战，旨在帮助开发者深入理解并掌握 LLM 的基本原理与应用。因此，本书适合大学生、研究人员、LLM 爱好者阅读。在阅读本书之前，你需要具备一定的编程经验，尤其是要对 Python 编程语言有一定的了解。同时，你最好具备深度学习的相关知识，并了解 NLP 领域的相关概念和术语，以便更轻松地阅读本书。","最后，欢迎每一位读者在阅读完本书后加入到 LLM 开发者的行列。作为国内 AI 开源社区，我们希望充分聚集共创者，一起丰富这个开源 LLM 的世界，打造更多、更全面特色 LLM 的教程。星火点点，汇聚成海。我们希望成为 LLM 与普罗大众的阶梯，以自由、平等的开源精神，拥抱更恢弘而辽阔的 LLM 世界。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"","goals":["理解「前言」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-022","moduleId":"foundation","title":"NLP 基础概念","level":"入门","order":23,"concepts":["NLP 基础概念","什么是 NLP","NLP 发展历程","早期探索","符号主义与统计方法","Embedding","Word2Vec"],"structure":["什么是 NLP","NLP 发展历程","早期探索（1940年代 - 1960年代）","符号主义与统计方法（1970年代 - 1990年代）","机器学习与深度学习（2000年代至今）","NLP 任务","中文分词"],"body":["欢迎大家来到 NLP 基础概念的学习，本章节将为大家介绍 NLP 的基础概念，帮助大家更好地理解和回顾 NLP 的相关知识。","NLP 是 一种让计算机理解、解释和生成人类语言的技术。它是人工智能领域中一个极为活跃和重要的研究方向，其核心任务是通过计算机程序来模拟人类对语言的认知和使用过程。NLP 结合了计算机科学、人工智能、语言学和心理学等多个学科的知识和技术，旨在打破人类语言和计算机语言之间的障碍，实现无缝的交流与互动。","NLP技术使得计算机能够执行各种复杂的语言处理任务，如中文分词、子词切分、词性标注、文本分类、实体识别、关系抽取、文本摘要、机器翻译、自动问答等。这些任务不仅要求计算机能够识别和处理语言的表层结构，更重要的是可以理解语言背后的深层含义，包括语义、语境、情感和文化等方面的复杂因素。","随着深度学习等现代技术的发展，NLP 已经取得了显著的进步。通过训练大量的数据，深度学习模型能够学习到语言的复杂模式和结构，从而在多个 NLP 任务上取得了接近甚至超越人类水平的性能。然而，尽管如此，NLP 仍然面临着诸多挑战，如处理歧义性、理解抽象概念、处理隐喻和讽刺等。研究人员正致力于通过更加先进的算法、更大规模的数据集和更精细的语言模型来解决这些问题，以推动NLP技术不断发展。","NLP 的发展历程是从早期的规则基础方法，到统计方法，再到现在的机器学习和深度学习方法的演变过程。每一次技术变革都极大地推动了 NLP 技术的发展，使其在机器翻译、情感分析、实体识别和文本摘要等任务上取得了显著成就。随着计算能力的不断增强和算法的不断优化，NLP的未来将更加光明，能够在更多领域发挥更加重要的作用。","抽取式摘要：抽取式摘要通过直接从原文中选取关键句子或短语来组成摘要。优点是摘要中的信息完全来自原文，因此准确性较高。然而，由于仅仅是原文中句子的拼接，有时候生成的摘要可能不够流畅。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"英文输入：The cat sits on the mat. 英文切割输出：[The | cat | sits | on | the | mat] 中文输入：今天天气真好，适合出去游玩. 中文切割输出：[\"今天\", \"天气\", \"真\", \"好\", \"，\", \"适合\", \"出去\", \"游玩\", \"。\"]","goals":["理解「NLP 基础概念」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-023","moduleId":"foundation","title":"Transformer 架构","level":"入门","order":24,"concepts":["Transformer 架构","注意力机制","什么是注意力机制","深入理解注意力机制","注意力机制的实现","Token","Embedding"],"structure":["注意力机制","什么是注意力机制","深入理解注意力机制","注意力机制的实现","自注意力","创建一个上三角矩阵，用于遮蔽未来信息。","先通过 full 函数创建一个 1 * seq_len * seq_len 的矩阵"],"body":["随着 NLP 从统计机器学习向深度学习迈进，作为 NLP 核心问题的文本表示方法也逐渐从统计学习向深度学习迈进。正如我们在第一章所介绍的，文本表示从最初的通过统计学习模型进行计算的向量空间模型、语言模型，通过 Word2Vec 的单层神经网络进入到通过神经网络学习文本表示的时代。但是，从 计算机视觉（Computer Vision，CV）为起源发展起来的神经网络，其核心架构有三种：","由于 NLP 任务所需要处理的文本往往是序列，因此专用于处理序列、时序数据的 RNN 往往能够在 NLP 任务上取得最优的效果。事实上，在注意力机制横空出世之前，RNN 以及 RNN 的衍生架构 LSTM 是 NLP 领域当之无愧的霸主。例如，我们在第一章讲到过的开创了预训练思想的文本表示模型 ELMo，就是使用的双向 LSTM 作为网络架构。","但 RNN 及 LSTM 虽然具有捕捉时序信息、适合序列生成的优点，却有两个难以弥补的缺陷：","针对这样的问题，Vaswani 等学者参考了在 CV 领域被提出、被经常融入到 RNN 中使用的注意力机制（Attention）（注意，虽然注意力机制在 NLP 被发扬光大，但其确实是在 CV 领域被提出的），创新性地搭建了完全由注意力机制构成的神经网络——Transformer，也就是大语言模型（Large Language Model，LLM）的鼻祖及核心架构，从而让注意力机制一跃成为深度学习最核心的架构之一。","注意力机制最先源于计算机视觉领域，其核心思想为当我们关注一张图片，我们往往无需看清楚全部内容而仅将注意力集中在重点部分即可。而在自然语言处理领域，我们往往也可以通过将重点注意力集中在一个或几个 token，从而取得更高效高质的计算效果。","前馈神经网络（Feedforward Neural Network，FNN），即数据从输入层单向流动到输出层，无循环结构，各层之间通过全连接或特定方式传递信息，其中多层感知机（Multi-Layer Perceptron，MLP）是最常见的形式，每一层的神经元都和上下两层的每一个神经元完全连接，如图2.1所示:"],"formula":"value = 0.6 * 10 + 0.4 * 5 + 0 * 2 = 8","code":"{ \"apple\":10, \"banana\":5, \"chair\":2 }","goals":["理解「Transformer 架构」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-024","moduleId":"foundation","title":"预训练语言模型","level":"入门","order":25,"concepts":["预训练语言模型","Encoder-only PLM","BERT","Token","Embedding","Word2Vec","RNN"],"structure":["Encoder-only PLM","BERT","（1）思想沿承","（2）模型架构——Encoder Only"],"body":["在上一章，我们详细讲解了给 NLP 领域带来巨大变革注意力机制以及使用注意力机制搭建的模型 Transformer，NLP 模型的里程碑式转变也就自此而始。在上文对 Transformer 的讲解中我们可以看到，Transformer 结构主要由 Encoder、Decoder 两个部分组成，两个部分分别具有不一样的结构和输入输出。","在本章中，我们将以 Encoder-Only、Encoder-Decoder、Decoder-Only 的顺序来依次介绍 Transformer 时代的各个主流预训练模型，分别介绍三种核心的模型架构、每种主流模型选择的预训练任务及其独特优势，这也是目前所有主流 LLM 的模型基础。","BERT 是一个统一了多种思想的预训练模型。其所沿承的核心思想包括：","接下来，我们将从模型架构、预训练任务以及下游任务微调三个方面深入剖析 BERT，分析 BERT 的核心思路及优势，帮助大家理解 BERT 为何能够具备远超之前模型的性能，也从而更加深刻地理解 LLM 如何能够战胜 BERT 揭开新时代的大幕。","BERT 的模型架构是取了 Transformer 的 Encoder 部分堆叠而成，其主要结构如图3.1所示："],"formula":"GELU 的核心思路为将随机正则的思想引入激活函数，通过输入自身的概率分布，来决定抛弃还是保留自身的神经元。关于 GELU 的原理与核心思路，此处不再赘述，有兴趣的读者可以自行学习。 BERT 的 注意力机制和 Transformer 中 Encoder 的 自注意力机制几乎完全一致，但是 BERT 将相对位置编码融合","code":"","goals":["理解「预训练语言模型」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-025","moduleId":"foundation","title":"大语言模型","level":"入门","order":26,"concepts":["大语言模型","什么是 LLM","LLM 的定义","LLM 的能力","Token","Transformer","BERT"],"structure":["什么是 LLM","LLM 的定义","LLM 的能力","（1）涌现能力（Emergent Abilities）","（2）上下文学习（In-context Learning）","（3）指令遵循（Instruction Following）","（4）逐步推理（Step by Step Reasoning）"],"body":["在前三章，我们从 NLP 的定义与主要任务出发，介绍了引发 NLP 领域重大变革的核心思想——注意力机制与 Transformer 架构。随着 Transformer 架构的横空出世，NLP 领域逐步进入预训练-微调范式，以 Transformer 为基础的、通过预训练获得强大文本表示能力的预训练语言模型层出不穷，将 NLP 的各种经典任务都推进到了一个新的高度。","在本章中，我们将结合上文的模型架构讲解，深入分析 LLM 的定义、特点及其能力，为读者揭示 LLM 与传统深度学习模型的核心差异，并在此基础上，展示 LLM 的实际三阶段训练过程，帮助读者从概念上梳理清楚 LLM 是如何获得这样的独特能力的，从而为进一步实践 LLM 完整训练提供理论基础。","LLM，即 Large Language Model，中文名为大语言模型或大型语言模型，是一种相较传统语言模型参数量更多、在更大规模语料上进行预训练的语言模型。","在第一章中，我们已经介绍了语言模型的概念，即通过预测下一个 token 任务来训练的 NLP 模型。LLM 使用与传统预训练语言模型相似的架构与预训练任务（如 Decoder-Only 架构与 CLM 预训练任务），但拥有更庞大的参数、在更海量的语料上进行预训练，也从而展现出与传统预训练语言模型截然不同的能力。","2023.03 | 斯坦福-Alpaca、Vicuna；智谱-ChatGLM|OpenAI-GPT4；百度-文心一言；Anthropic-Claude；Google-Bard","模型状态（Model States），包括模型参数、模型梯度和优化器 Adam 的状态参数。假设模型参数量为 1M，一般来说，在混合精度训练的情况下，该部分需要 16M 的空间进行存储，其中 Adam 状态参数会占据 12M 的存储空间。"],"formula":"文本 -> Token -> 向量表示 -> 模型计算 -> 任务输出","code":"{ \"instruction\":\"即输入的用户指令\", \"input\":\"执行该指令可能需要的补充输入，没有则置空\", \"output\":\"即模型应该给出的回复\" }","goals":["理解「大语言模型」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-026","moduleId":"foundation","title":"动手搭建大模型","level":"入门","order":27,"concepts":["动手搭建大模型","动手实现一个 LLaMA2 大模","定义超参数","构建 RMSNorm","获取输入张量的形状","Token","Attention"],"structure":["动手实现一个 LLaMA2 大模型","定义超参数","构建 RMSNorm","获取输入张量的形状：批量大小、序列长度、键/值对头的数量、每个头的维度大小","如果重复次数为1，则不需要重复，直接返回原始张量","对张量进行扩展和重塑操作以重复键值对","注意：此处的dim应为 dim//n_head，因为我们是对每个head进行旋转嵌入"],"body":["Meta（原Facebook）于2023年2月发布第一款基于Transformer结构的大型语言模型LLaMA，并于同年7月发布同系列模型LLaMA2。我们在第四章已经学习和了解了LLM，以及如何训练LLM等内容。本小节我们就来学习如何动手实现一个LLaMA2模型。","首先我们需要定义一些超参数，这些超参数包括模型的大小、层数、头数、词嵌入维度、隐藏层维度等等。这些超参数可以根据实际情况进行调整。","这里我们自定义一个`ModelConfig`类，来存储和记录我们的超参数，这里我们继承了`PretrainedConfig`类，这是`transformers`库中的参数类，我们可以通过继承这个类来方便的使用`transformers`库中的一些功能，也方便在后续导出Hugging Face模型。","> 在以下代码中出现 `args` 时，即默认为以上 `ModelConfig` 参数配置。","我们来看一下其中的一些超参数的含义，比如`dim`是模型维度，`n_layers`是Transformer的层数，`n_heads`是注意力机制的头数，`vocab_size`是词汇表大小，`max_seq_len`是输入的最大序列长度等等。上面的代码中也对每一个参数做了详细的注释，在后面的代码中我们会根据这些超参数来构建我们的模型。","$x_i$ 是输入向量的第 $i$ 个元素"],"formula":"\\text{RMSNorm}(x) = \\frac{x}{\\sqrt{\\frac{1}{n}\\sum_{i=1}^{n}x_i^2 + \\epsilon}} \\cdot \\gamma","code":"from transformers import PretrainedConfig class ModelConfig(PretrainedConfig): model_type = \"Tiny-K\" def __init__( self, dim: int = 768, # 模型维度 n_layers: int = 12, # Transformer的层数","goals":["理解「动手搭建大模型」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"foundation-027","moduleId":"foundation","title":"大语言模型基础","level":"入门","order":28,"concepts":["大语言模型基础","语言模型与 Transforme","从 N-gram 到 RNN","Token","Embedding","RNN","LSTM"],"structure":["语言模型与 Transformer 架构","从 N-gram 到 RNN"],"body":["前两章分别介绍了智能体的定义和发展历史，本章将完全聚焦于大语言模型本身解答一个关键问题：现代智能体是如何工作的？我们将从语言模型的基本定义出发，通过对这些原理的学习，为理解LLM如何获得强大的知识储备与推理能力打下坚实的基础。","**语言模型 (Language Model, LM)** 是自然语言处理的核心，其根本任务是计算一个词序列（即一个句子）出现的概率。一个好的语言模型能够告诉我们什么样的句子是通顺的、自然的。在多智能体系统中，语言模型是智能体理解人类指令、生成回应的基础。本节将回顾从经典的统计方法到现代深度学习模型的演进历程，为理解后续的 Transformer 架构打下坚实的基础。","在深度学习兴起之前，统计方法是语言模型的主流。其核心思想是，一个句子出现的概率，等于该句子中每个词出现的条件概率的连乘。对于一个由词 $w_1,w_2,\\cdots,w_m$ 构成的句子 S，其概率 P(S) 可以表示为：","公式的含义就是：我们用“词对 $Count(w_{i−1},w_i)$ 出现的次数”除以“词 $Count(w_{i−1})$ 出现的总次数”，来作为 $P(w_i∣w_{i−1})$ 的一个近似估计。","为了让这个过程更具体，我们来手动进行一次计算。假设我们拥有一个仅包含以下两句话的迷你语料库：`开源学习社区 agent learns`, `开源学习社区 agent works`。我们的目标是：使用 Bigram (N=2) 模型，估算句子 `开源学习社区 agent learns` 出现的概率。根据 Bigram 的假设，我们每次会考察连续的两个词（即一个词对）。","**Trigram (当 N=3 时)** ：类似地，我们假设一个词的出现只与它前面的两个词有关："],"formula":"这个公式被称为概率的链式法则。然而，直接计算这个公式几乎是不可能的，因为像 $P(w_m∣w_1,\\cdots,w_{m−1})$ 这样的条件概率太难从语料库中估计了，词序列 $w_1,\\cdots,w_{m−1}$ 可能从未在训练数据中出现过。 为了解决这个问题，研究者引入了**马尔可夫假设 (Markov Assu","code":"import collections # 示例语料库，与上方案例讲解中的语料库保持一致 corpus = \"开源学习社区 agent learns 开源学习社区 agent works\" tokens = corpus.split() total_tokens = len(tokens) # --- 第一步:计算 P(开源学习社区) --- count_开源学习社区 = tokens.count('开源学习社区')","goals":["理解「大语言模型基础」在「大模型基础」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-028","moduleId":"training","title":"文本分类简单实现","level":"进阶","order":29,"concepts":["文本分类简单实现","一、文本分类任务概述","二、NLP 项目通用流程","三、新闻文本分类代码实践","模块化设计思路","Token","Embedding"],"structure":["一、文本分类任务概述","二、NLP 项目通用流程","三、新闻文本分类代码实践","模块化设计思路","步骤一：数据解析与加载","数据加载","为了进行探索，先定义一个简单的分词函数"],"body":["在理论篇的**第二章**中，我们已经学习了如何将文本进行分词，并通过词向量技术将其转换为模型可以理解的数值形式。本节将在此基础上，以一个经典的新闻分类任务为例，详细讲解如何从零开始，一步步构建、训练和评估一个用于文本分类的深度学习模型。这个过程将涵盖数据处理、模型设计、训练循环、推理预测等所有核心环节。","无论是文本分类，还是其他更复杂的 NLP 任务，深度学习的解决方案通常遵循一个标准化的项目流程。可以概括为以下几个核心模块：","这个流程是搭建深度学习应用的通用范式，是一套标准化、可复用的模板。理解并掌握这套流程，比单纯实现某个模型更为重要。在接下来的内容中，我们将按照这个流程，将各个模块封装成独立的类，构建一个更规范、更易于维护和扩展的项目。","本节将使用 `scikit-learn` 库中的 `20 Newsgroups` 数据集，这是一个包含约20000篇新闻文档、近似均衡分布在20个不同新闻组（类别）的集合。","在开始编写具体代码之前，更重要的步骤是“设计”。一个原则是，要先想清楚每个模块的输入和输出是什么。","**数据模块的输出是什么？** -> 模型需要的“词元ID序列” (`token_ids`) 张量和“标签ID” (`label_ids`) 张量。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"graph LR A[1. 数据准备] --> B[2. 模型构建] B --> C[3. 定义损失与优化器] subgraph \"训练循环 (Training Loop)\" D[4. 迭代训练] --> E[5. 模型评估] E --> F{6. 是否更优?} F -- 是/Yes --> G[7. 保存模型]","goals":["理解「文本分类简单实现」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-029","moduleId":"training","title":"基于 LSTM 的文本分类","level":"进阶","order":30,"concepts":["基于 LSTM 的文本分类","一、从“词袋”到序列建模","二、代码修改实践","改造 `collate_fn`","构建 `TextClassifi","Token","Embedding"],"structure":["一、从“词袋”到序列建模","二、代码修改实践","改造 `collate_fn` 以提供序列长度","构建 `TextClassifierLSTM` 模型","调整 `Trainer` 和 `Predictor`","在 Predictor.predict 方法中","(文本分块逻辑不变) ..."],"body":["（1）**词嵌入**：将输入的 `token_ids` (`[batch_size, seq_len]`) 转换为词向量 `embedded` (`[batch_size, seq_len, embed_dim]`)。","（2）**特征提取**：通过几层全连接网络，将每个词向量独立地映射到更高维的特征空间，得到 `token_features` (`[batch_size, seq_len, hidden_dim]`)。","（3）**掩码平均池化**：为了处理变长序列，将所有 `token_features` 沿 `seq_len` 维度进行求和，再除以真实长度，得到一个代表整句话的向量 `pooled_features` (`[batch_size, hidden_dim]`)。","（4）**分类**：将 `pooled_features` 输入最后的分类层，得到最终预测。","这个流程的瓶颈在第三步。**平均池化**操作将序列信息压缩成一个向量，这可能导致词序信息的丢失。","除了词嵌入层 `nn.Embedding` 和分类层 `nn.Linear`，核心是一个 `nn.LSTM` 层。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"def collate_fn(batch): max_batch_len = max(len(item[\"token_ids\"]) for item in batch) batch_token_ids, batch_labels, batch_lengths = [], [], [] for item in batch: token_ids = item[\"token_ids\"] # 新增：记录真实长度 lengths = len(token_ids)","goals":["理解「基于 LSTM 的文本分类」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-030","moduleId":"training","title":"微调 BERT 模型进行文本分类","level":"进阶","order":31,"concepts":["微调 BERT 模型进行文本分类","一、从“序列建模”到“预训练微调","二、代码修改实践","替换为 `BertTokeniz","直接使用BertTokenize","Token","Embedding"],"structure":["一、从“序列建模”到“预训练微调”","二、代码修改实践","替换为 `BertTokenizer`","直接使用BertTokenizer进行编码",". 加载预训练的BERT模型",". 定义分类头","在 Trainer._run_epoch 方法中"],"body":["这就是**预训练语言模型**，特别是 BERT，所要解决的问题。在**第五章第一节**中，我们已经学习了 BERT 的原理。它通过在海量原始文本上以**自监督**的方式构造“掩码语言模型”和“下一句预测”等训练任务（无需人工标注标签），学习到了丰富的语言学知识和世界知识。本节是文本分类系列实战的最后一站。我们将把模型架构迁移为 BERT，探索从“从零训练”到“微调”这一范式转变所带来的性能提升。","回顾前两个模型，它们的核心都是在特定任务数据上从随机初始化的词向量开始学习如何进行分类。而基于 BERT 的微调则采用了一种完全不同的范式，通常包含以下三个步骤：","（1）**加载预训练权重**：我们不再随机初始化模型，而是加载一个已经在海量数据（如维基百科、书籍）上训练好的 BERT 模型。这个模型已经是一个通用的“语言理解专家”。","（2）**附加任务相关的“头”**：在 BERT 模型的主体结构之上，我们添加一个简单的、未经训练的分类层（通常就是一个全连接层）。","（3）**在下游任务上“微调”**：使用我们的新闻分类数据，对整个模型（或者仅仅是顶部的分类层）进行训练。由于 BERT 部分已经具备了强大的语言理解能力，整个模型可以很快地适应新的分类任务，并且通常只需要很少的训练轮次和较小的学习率。","通过 `BertTokenizer.from_pretrained` 从输出目录一次性恢复完整的分词器配置与词表，无需手动加载独立的 vocab 文件；"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"from transformers import BertTokenizer bert_model_name = 'bert-base-uncased' tokenizer = BertTokenizer.from_pretrained(bert_model_name) # 查看特殊token print(f\"UNK token: '{tokenizer.unk_token}', ID: {tokenizer.unk_token_id}\") print(f\"PAD token: '{tokenizer.pad_token}', ID: {tokenizer.pad_token_id}\") print(f\"CLS token: '{t","goals":["理解「微调 BERT 模型进行文本分类」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-031","moduleId":"training","title":"命名实体识别概要","level":"进阶","order":32,"concepts":["命名实体识别概要","一、命名实体识别简介","什么是命名实体？","NER 的应用价值","二、命名实体识别的应用场景","Token","Embedding"],"structure":["一、命名实体识别简介","什么是命名实体？","NER 的应用价值","二、命名实体识别的应用场景","智能搜索","聊天机器人与智能辅助诊断","三、NER的数据标注"],"body":["简单来说，命名实体就是现实世界中事物的名称，是文本中那些指向特定对象、具有可识别性和唯一性的词语或短语。NER 的任务就是将这些“名字”找出来，并贴上预先定义好的标签。常见的实体类型包括：","一个词是否被视为实体，以及它属于哪种实体，完全由业务场景的需求来决定。例如，在通用的场景下，“苹果”可能只是一个水果；但在数码产品的讨论中，它很可能需要被识别为一个“组织机构名”或“品牌名”。","> 不同数据集的实体类型定义差异较大（如 CoNLL 2003 仅含 PER/ORG/LOC/MISC；OntoNotes 5 则包含 PERSON、GPE、ORG、FAC、PRODUCT、EVENT、WORK_OF_ART 等更细类别）。实际项目应先明确标签集合。","如果说 **文本分类** 是让计算机理解一段话的 **主旨大意**（比如判断情感是积极还是消极），那么 **NER** 就是让它更进一步，学会从文本中**“抓住重点”**，精准地找出谁（Who）、在哪（Where）、做了什么（What）等关键信息。这一能力使机器能够“抓住”文本中的关键信息，由此衍生出了更多 NLP 应用：","以医疗领域为例，NER可以从电子病历、医学文献等海量文本中，像专业医生一样抽取出关键信息，例如“II型糖尿病”等**疾病诊断**、“多饮”和“多食”等**症状描述**、“血糖检测”等**检查方式**，以及“二甲双胍口服”等**治疗方案**。通过这些抽取出的实体，可以高效地构建医疗知识图谱，为辅助诊断系统、临床研究等提供强大的数据支持。","**人名 (PER)**: 姚明, 雷军"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"{ \"token\": [\"他\", \"就\", \"读\", \"于\", \"北\", \"京\", \"大\", \"学\"], \"span\": [ {\"type\": \"LOC\", \"start\": 4, \"end\": 5}, {\"type\": \"ORG\", \"start\": 4, \"end\": 7} ] }","goals":["理解「命名实体识别概要」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-032","moduleId":"training","title":"NER 项目的数据处理","level":"进阶","order":33,"concepts":["NER 项目的数据处理","一、数据处理流程总览","明确数据处理的目标","数据格式解析","原始数据示例","Token","RNN"],"structure":["一、数据处理流程总览","明确数据处理的目标","数据格式解析","原始数据示例","字段说明","二、构建标签映射","加载数据"],"body":["在上一节，我们简单了解了命名实体识别的任务定义、应用场景及主流实现方法。本节将正式进入编码阶段，从数据处理开始，逐步构建一个完整的 NER 项目。为了清晰地构建 NER 的处理流程，我们采用流程化的代码组织思路，将整个流程拆分为多个独立的脚本。","在 NLP 中，原始的文本和标注数据是无法直接被神经网络模型利用的。需要将这些原始数据转换成模型能够理解的、标准化的数字张量。那么，具体要转换成什么样？又该如何转换？这就是本节数据处理流程要解决的问题。","在设计之前，我们需要先明确最终的目标。对于一个命名实体识别任务，数据处理需要产出什么？","我们使用的是 `CMeEE-V2`（中文医学实体抽取）数据集。经过分析，该数据集采用的是标准的 **JSON 数组** 格式。","打开 `CMeEE-V2_train.json`，可以看到文件内容是一个完整的 JSON 数组：","**模型的输入 (X) 是什么？**"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"[ ..., { \"text\": \"（2）室上性心动过速可用常规抗心律失常药物控制，年龄小于5岁。\", \"entities\": [ { \"start_idx\": 3,","goals":["理解「NER 项目的数据处理」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-033","moduleId":"training","title":"模型构建、训练与推理","level":"进阶","order":34,"concepts":["模型构建、训练与推理","一、模型结构设计","二、构建 PyTorch 模型","输入与输出","基础模型框架","Token","Embedding"],"structure":["一、模型结构设计","二、构建 PyTorch 模型","输入与输出","基础模型框架","torch/nn/utils/rnn.py",". Token Embedding 层",". 使用 ModuleList 构建多层双向 GRU"],"body":["书接上回，我们已经完成了 NER 项目的数据处理工作，包括构建标签映射、词汇表以及一个功能完备的 `DataLoader`。本节将聚焦于如何利用 PyTorch 构建一个序列标注模型，并进一步封装一个可复用的训练流程，最终实现模型的训练、评估与推理。","正如第一节所介绍，NER 任务本质上是一个 **序列标注** 问题——为输入序列中的每一个 Token 预测一个对应的标签。基于此，可以设计一个有效的模型结构，它主要由三个核心部分组成：","> 整个模型本质上是一个 **Token 分类模型**：接收 Token 序列，并为其中的每一个 Token 输出一个分类结果。","编写模型代码之前，先来回顾一下 `DataLoader` 输出的数据。如下图所示，经过 `collate_fn` 处理后，每个批次（Batch）的数据都包含了三个 `torch.Tensor`：`token_ids`、`label_ids` 和 `attention_mask`。","其中，`token_ids` 是模型最直接的输入，它是一个 `torch.int64` 类型的张量，代表了文本序列转换后的 Token 索引。","**Token Embedding 层**"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"import torch if __name__ == '__main__': token_ids = torch.tensor([ [210, 18, 871, 147, 0, 0, 0, 0], [922, 2962, 842, 210, 18, 871, 147, 0] ], dtype=torch.int64)","goals":["理解「模型构建、训练与推理」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-034","moduleId":"training","title":"模型的推理与优化","level":"进阶","order":35,"concepts":["模型的推理与优化","一、理解模型输出","Token 级准确率的陷阱","对推理流程的启发","二、从标签到实体","Token","GRU"],"structure":["一、理解模型输出","Token 级准确率的陷阱","对推理流程的启发","二、从标签到实体：解码预测序列","解码逻辑详解","代码实现","三、封装推理器"],"body":["经过前面章节的数据处理、模型构建与训练，我们已经得到了一个可用的 NER 模型。本章将探讨如何实现模型的推理过程，并深入研究如何通过自定义损失函数来应对数据不均衡问题，通过集成可视化日志、提前停止和断点续训等功能，进一步提升训练框架的健壮性和实用性。","在上一节构建 `Trainer` 时，已经明确了实体级别的 F1 值是衡量模型性能的核心标准，而非简单的 Token 分类准确率。这里探讨一下 **为什么** 需要这样做，以及这对设计推理流程有何启发。","> 当模型训练到一定阶段后，其预测结果可能会出现大量甚至全部为 `'O'`（ID 为 0）的情况。尽管此时的 Token 准确率看上去很高，但模型实际上已经陷入了通过预测多数类来最小化损失的“捷径”中，这是一种典型的过拟合现象，说明模型并没有真正学会识别实体。","**模型的原始输出（Token 标签序列）本身不是最终交付物**。我们需要一个“后处理”或“解码”步骤，将这个标签序列转换成用户真正关心的结构化的实体列表。这不仅是正确评估模型的需要，也是模型能否在实际应用中创造价值的关键。","模型的前向传播最终输出的是一个 `logits` 张量，形状为 `[batch_size, seq_len, num_tags]`。经过 `argmax` 操作后，会得到一个标签 ID 序列，例如 `[0, 9, 10, 11, 0, ...]`。","**遇到 `B-` (实体开始)**:"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"# code/C8/06_predict.py def _extract_entities(self, tokens, tags): entities = [] current_entity = None for i, tag in enumerate(tags): if tag.startswith('B-'): # 如果前一个实体未正确结束，则放弃","goals":["理解「模型的推理与优化」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-035","moduleId":"training","title":"PEFT 技术综述","level":"进阶","order":36,"concepts":["PEFT 技术综述","一、大模型时代的“微调”困境","“提示”范式的兴起与局限","参数高效微调的诞生","Prefix Tuning","Token","Embedding"],"structure":["一、大模型时代的“微调”困境","“提示”范式的兴起与局限","参数高效微调的诞生","Prefix Tuning","Prompt Tuning","三、P-Tuning v2","P-Tuning 的主要逻辑"],"body":["从本章开始，我们将步入对大模型微调的学习。之所以将 PEFT 作为学习的起点，是因为它不仅是当前应对大模型训练高昂成本的主流解决方案，更代表了我们与超大模型互动和应用范式上的一次重要变革。理解 PEFT，是掌握如何在资源有限的条件下，高效、灵活地驾驭大模型强大能力的关键第一步。","自 BERT 模型发布以来，“预训练-微调”（Pre-train and Fine-tune）的范式在自然语言处理领域取得了巨大成功。不过，当模型参数规模从 BERT 的数亿级别跃升至 GPT-3 的千亿级别时，传统的全量微调（Full Fine-Tuning）遇到了挑战：","面对这些困境，研究者们迫切需要一种新的范式，既能有效利用大模型的强大能力，又能避免全量微调带来的高昂成本。","但是，“硬提示”这种“刀耕火种”式的方法存在三个明显的局限。找到最优的提示词往往需要大量的试错和经验，过程繁琐且不稳定，充满了“玄学”；离散的文本提示在表达能力上存在上限，难以充分激发和精确控制大模型的潜力；而且在一个模型上精心设计的提示，换到另一个模型或另一种语言上，效果可能大打折扣。","如何找到一种既能有效利用大模型能力，又不必承受全量微调高昂成本的方法？学术界和工业界开始探索一种全新的方法——**参数高效微调（Parameter-Efficient Fine-Tuning, PEFT）**。","**高昂的训练成本**：微调一个千亿参数的大模型需要巨大的计算资源（数百 GB 的显存）和时间成本，这对于绝大多数开发者和企业来说是遥不可及的。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"","goals":["理解「PEFT 技术综述」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-036","moduleId":"training","title":"LoRA 方法详解","level":"进阶","order":37,"concepts":["LoRA 方法详解","一、低秩近似的核心思想","二、LoRA 的优势与实践","核心优势","关键实践","Token","Attention"],"structure":["一、低秩近似的核心思想","二、LoRA 的优势与实践","核心优势","关键实践","三、AdaLoRA 自适应微调","基于 SVD 的参数化","重要性评分与动态预算分配"],"body":["在上一节中，我们探讨了以 Adapter 和各类 Prompt Tuning 为代表的 PEFT 技术。它们通过在模型中**插入**新的模块或在输入端**添加**可学习的提示，巧妙地实现了高效微调。这些方法的核心，都是在尽量不“打扰”原始模型权重的前提下，通过影响模型的**激活值**来适应新任务。","本节，我们将介绍一种另辟蹊径，也是当前社区应用最广泛的 PEFT 方法——**LoRA（Low-Rank Adaptation of Large Language Models）**。它不再“绕道而行”，而是直击模型的**权重矩阵**，并提出一个观点。那就是大模型的参数更新，或许并不需要那么“兴师动众”。","全量微调之所以成本高昂，是因为它需要为模型中每一个权重矩阵 $W$（维度可能高达数万）计算并存储一个同样大小的更新矩阵 $ΔW$。为了解决这个问题，研究者们提出了像 Adapter Tuning 和 Prompt Tuning 这样的参数高效微调方法。但是，它们也存在一些未解决的痛点。Adapter 虽好，却会引入额外的**推理延迟**；Prompt Tuning 则会**占用输入序列长度**，且优化难度较高。","有没有一种方法，既能大幅减少参数，又不引入推理延迟，还能直接作用于模型权重呢？这就是 LoRA 试图回答的问题。它的提出，源于一个假设 ：","> **大语言模型是过参数化的（Over-parametrized），它们在针对特定任务进行微调时，权重更新矩阵 $ΔW$ 具有一个很低的“内在秩”（Intrinsic Rank）**。","**效果媲美全量微调，且不占用输入长度**：与 Prompt-Tuning 等作用于输入激活值的方法不同，LoRA 直接修改权重矩阵，能更深入、更直接地影响模型的行为，效果也更接近于全量微调。同时，它不添加任何 virtual token，不会占用上下文长度，在处理长文本任务时更有优势。"],"formula":"其中， $W_0 \\in \\mathbb{R}^{d \\times k}$，低秩分解后的 $B \\in \\mathbb{R}^{d \\times r}$， $A \\in \\mathbb{R}^{r \\times k}$，而秩 $r \\ll \\min(d, k)$。 LoRA 的工作方式可以理解为在原始的预训练权重 $W","code":"","goals":["理解「LoRA 方法详解」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-037","moduleId":"training","title":"基于 peft 库的 LoRA 实战","level":"进阶","order":38,"concepts":["基于 peft 库的 LoRA","一、`peft` 库的设计理念","二、`peft` 库的核心组件","声明式配置 PeftConfig","动态注入生成 PeftModel","Token","Embedding"],"structure":["一、`peft` 库的设计理念","二、`peft` 库的核心组件","声明式配置 PeftConfig","动态注入生成 PeftModel","三、LoRA 微调实战流程","加载依赖、基础模型与分词器","对量化后的模型进行预处理"],"body":["在前两个小节中，探讨了参数高效微调（PEFT）的理论背景和主流方法，特别是 LoRA 的核心原理。这些知识为我们提供了理论支撑，但要真正驾驭这些技术，还需要一个强大而易用的工具。本节将进入实战环节，学习使用当前社区常用的 PEFT 工具库——Hugging Face 的 `peft` 。","`peft` 库的设计理念与 Hugging Face 生态系统一脉相承，它希望将复杂的 PEFT 技术（如 LoRA, Prefix Tuning, Adapter 等）抽象成统一、简洁的接口，让开发者能够以最小的代码改动，将这些高效微调方法无缝地应用到 Hugging Face Hub 上的大模型上。如图 11-11，`peft` 库的官方文档将其内容划分为快速入门、方法指南、概念指南和参考手册，便于开发者上手。","要理解 `peft` 库，首先要明白它并非要取代基础的模型库（例如 `transformers`），而是作为其 **插件** 或 **增强模块** 而存在。","通过这种方式，无需改动庞大的基础模型本身（冻结其大部分权重），只需定义、训练和切换不同的轻量级插件（Adapter），就能让模型高效地适应各种下游任务。这不仅节省了大量的计算和存储资源，也使得模型的管理和部署变得更加灵活。","`peft` 库通过几个核心的类和函数，实现了对各种 PEFT 方法的统一封装，使其遵循一致的调用逻辑。接下来，简单介绍一下。","**基础预训练模型**：如同主角“天命人”（悟空），他本身已拥有强大的基础能力和标志性的金箍棒。但面对不同的 Boss（下游任务），只靠基础能力会很吃力。让他“重新修炼”以获得全新能力（即全量微调）显然不现实。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig import torch model_id = \"EleutherAI/pythia-2.8b-deduped\" # --- 使用 BitsAndBytesConfig 定义 8-bit 量化配置 --- bnb_config = BitsAndBytesConfig( load_in_8bit=True, )","goals":["理解「基于 peft 库的 LoRA 实战」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-038","moduleId":"training","title":"Qwen2.5 微调私有数据","level":"进阶","order":39,"concepts":["Qwen2.5 微调私有数据","一、Qwen2.5 模型要点解析","预训练奠定能力","Decoder-only 架构","分词器与对话模板","Token","Embedding"],"structure":["一、Qwen2.5 模型要点解析","预训练奠定能力","Decoder-only 架构","分词器与对话模板","定义模型 ID","加载分词器","应用对话模板"],"body":["在前几节的学习中，我们已经构建起一套完整的参数高效微调知识体系。手握“道”（PEFT 理论）与“器”（`peft` 库）之后，本节将以 Qwen2.5 模型为例，应用 QLoRA 技术进行微调实战。","Qwen2.5 是阿里巴巴开源的高性能大语言模型家族，涵盖了从 0.5B 到 72B 的多种参数规模，以满足不同场景的需求。它不仅是一个单独的模型，更是一个强大的基础平台，在其之上衍生出了 Qwen2.5-Math、Qwen2.5-Coder 等专业模型 。","在图 11-12 中展示了 Qwen 系列模型（从 Qwen1.5-72B 到 Qwen2.5-72B）的性能与其预训练数据量之间的正相关关系。随着数据规模从 3 万亿 Token 增长至 18 万亿 Token，模型在 MMLU、BBH、MBPP 和 Math 等多个关键基准测试上的得分均稳步提升。这证明，海量、高质量的预训练让 Qwen2.5 拥有了强大的通用能力。","Qwen2.5 强大的基础能力源于在高达 **18 万亿 Token** 的高质量、多样化数据上的预训练。这不仅是一个量的堆砌，更是在关键领域上的策略性强化：","了解模型的“学前教育”背景，能帮助我们更好地判断它是否适合我们的微调目标。","**通用知识**：涵盖了广泛的常识、百科知识，为模型的通用对话和理解能力奠定基础。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"system You are a helpful assistant. user 你好，请介绍一下你自己。 assistant 你好，我是通义千问...","goals":["理解「Qwen2.5 微调私有数据」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-039","moduleId":"training","title":"RLHF 技术详解","level":"进阶","order":40,"concepts":["RLHF 技术详解","一、模型对齐的必要性","二、通往对齐模型的三大阶段","三、RLHF 的形式化定义","训练奖励模型","Token","GPT"],"structure":["一、模型对齐的必要性","二、通往对齐模型的三大阶段","三、RLHF 的形式化定义","训练奖励模型","使用策略优化算法微调模型","PPO 与“对齐税”"],"body":["为了跨越从“遵循指令”到“理解偏好”的鸿沟，我们需要一种新的训练范式。**基于人类反馈的强化学习（Reinforcement Learning from Human Feedback, RLHF）** 正是解决这一问题的关键技术。它的核心目标就是让模型超越简单的模仿学习，真正理解并内化人类复杂的价值观，使其输出更符合我们的期望。","表 12-1 总结了 SFT 与 RLHF 在核心理念与实现方式上的关键差异：","如图 12-1 所示，RLHF 的有效性在实践中得到了强有力的验证。在 InstructGPT 的研究中 ，经过 RLHF 对齐后，仅有 13 亿参数的模型，在人类评估中的表现甚至超过了 1750 亿参数的原始 GPT-3 模型。这说明，让模型“懂”人类偏好，比单纯增加参数规模更能提升其实用性。","在实践中，对齐训练通常划分为三个阶段，分别面向通用语言能力、指令遵循与偏好对齐：","在大规模（万亿级 Token）无标注文本数据（网页、书籍、代码等）上进行自回归预训练。通过预测下一个词的任务，模型能够习得广泛的语料知识并具备基础的生成能力，从而得到一个基础语言模型。虽然此时模型尚未进行指令或偏好对齐，但这一阶段的训练门槛极高，不仅算力成本巨大，还需在超大规模数据与模型上解决复杂的收敛稳定性问题。","**缺乏泛化能力**：模型只能很好地响应数据集中出现过的指令模式，无法覆盖用户千奇百怪的真实意图。"],"formula":"P(y_w \\succ y_l | x) = \\sigma(r(x, y_w) - r(x, y_l))","code":"","goals":["理解「RLHF 技术详解」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-040","moduleId":"training","title":"LLaMA-Factory RLHF（DPO）实战","level":"进阶","order":41,"concepts":["LLaMA-Factory RL","一、LLaMA-Factory","二、环境搭建","拉取代码并安装依赖","验证 DPO 效果","Attention","LoRA"],"structure":["一、LLaMA-Factory 简介","二、环境搭建","拉取代码并安装依赖","验证 DPO 效果","本章小结"],"body":["我们在上一节详细介绍了 RLHF 的原理以及目前主流的 **DPO（Direct Preference Optimization）** 算法。相比于传统的 PPO，DPO 省去了训练独立的奖励模型（Reward Model）和复杂的强化学习采样过程，直接在偏好数据上优化策略，更加稳定且高效。","本节我们将使用开源社区流行的微调框架 **LLaMA-Factory**，配合阿里发布的轻量级指令模型 **Qwen2.5-0.5B-Instruct**，在单张消费级显卡（甚至 CPU）上跑通 DPO 对齐流程。","LLaMA-Factory 是一个简洁高效的大型语言模型（Large Language Model）训练与微调平台，旨在让开发者能够“零代码”地完成大模型的定制化训练。它具有以下特点：","在图 12-17 中，原始模型给出的答案**简短且武断**。虽然我们在 System Prompt 中要求它“逐步思考并合理地解释步骤”，但它忽略了这一指令，直接给出了一个基于表面关联（文中提到午餐）的猜测性结论。这种倾向于“快速给出答案”而非“深思熟虑”的风格，在未经过偏好对齐的模型中很常见。","当 DPO 训练完成后，如图 12-18 需要选择 `Checkpoint path` 为我们刚刚训练好的 Adapter（位于 `saves/Qwen2.5-0.5B-Instruct/lora/Qwen2.5-0.5B-dpo-demo`），然后再次点击 **Load model** 加载混合了 DPO 权重的模型。","**广泛的模型支持**：支持业界主流的开源模型，如 LLaMA、Qwen（通义千问）、Baichuan（百川）、ChatGLM、Mistral、Yi 等。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"git clone cd LLaMA-Factory","goals":["理解「LLaMA-Factory RLHF（DPO）实战」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-041","moduleId":"training","title":"模型量化实战","level":"进阶","order":42,"concepts":["模型量化实战","一、小资源干大活","冗余与压缩","量化的价值","二、从“装不下”到“跑得动”","Token","Transformer"],"structure":["一、小资源干大活","冗余与压缩","量化的价值","二、从“装不下”到“跑得动”","精度与显存的关系","显存估算公式","三、Transformers 中的主流集成方案"],"body":["在前面的实战章节中，为了在消费级显卡上加载大模型，我们已经初步体验了量化技术的魔力——只需几行代码配置 `BitsAndBytesConfig`，庞大的模型就能“塞”进显存。但你是否好奇，这背后的 `int8` 或 `nf4` 到底发生了什么？除了微调时用到的 BitsAndBytes，还有哪些量化技术更适合推理部署？","（1）**降低显存开销**：通常模型以 FP16（16位浮点数）格式存储，若量化为 INT8（8位整数），显存占用直接减半；若进一步量化为 INT4（4位整数），显存占用仅为原来的 1/4。原本需要多张 A100 才能加载的千亿模型，量化后可能只需一张消费级显卡即可运行。","（2）**提升推理速度**：数据量的减少意味着内存带宽（Memory Bandwidth）压力的降低。在 LLM 推理这种典型的“内存受限（Memory-bound）”场景下，更快的权重加载速度直接转化为更快的 Token 生成速度。","模型权重通常以浮点数形式存储，不同的精度决定了每个参数占用的字节数：","在动手实践之前，我们需要学会如何估算一个模型到底需要多少显存。在计算机存储单位中，1 GB = 1024 MB，1 MB = 1024 KB。但在估算模型参数量（如 7B = 7 Billion）和显存（GB）时，为了方便，通常近似认为 $1 \\text{ GB} \\approx 10^9 \\text{ Bytes}$。如果追求精确计算，记得除以 $1024^3$。模型所需显存大小的**通用估算公式**如下：","**FP32（Full Precision）**：单精度浮点数，占用 **4 Bytes**。这是深度学习训练的默认精度，但在推理时通常不需要这么高。"],"formula":"以我们之前学习过的 Qwen2.5 为例，这里选择 **Qwen2.5-7B**（约 70 亿参数，即 $7 \\times 10^9$）： （1）**FP16 / BF16 精度（2 Bytes/参数）**：","code":"pip install llmcompressor","goals":["理解「模型量化实战」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-042","moduleId":"training","title":"Deepspeed 框架介绍","level":"进阶","order":43,"concepts":["DeepSpeed 分布式训练框","一、DeepSpeed 全家桶一","DeepSpeed 概述","DeepSpeed Traini","二、显存开销与 ZeRO 系列内","Transformer","LoRA"],"structure":["DeepSpeed 分布式训练框架","一、DeepSpeed 全家桶一览","DeepSpeed 概述","DeepSpeed Training 要解决的三大挑战","二、显存开销与 ZeRO 系列内存优化","Qwen2.5-7B 全量训练需要多少显存？","Zero Redundancy Optimizer 的分治思路"],"body":["图 13-7 DeepSpeed 官方文档 Getting Started 页面","假设我们想要对一个 7B 模型（约 70 亿参数）进行全量预训练或微调，并采用常见的 Adam 优化器和混合精度训练策略。","再考虑到中间激活、临时张量、显存碎片等，实际训练中的峰值显存往往会来到 **120GB 甚至更高**。很多资料中常见的结论，一个 7B 模型如果想**全量训练**，大概需要 120GB 显存，就是由这一组估算推导出来的。","也就是说，在**经典数据并行 + Adam** 的设定下，**每个可训练参数平均需要约 16 Bytes 显存**（不含激活）。这就是 DeepSpeed 想要“动刀”的地方。**如果我们能把这 16 Bytes 中的冗余复制部分打散分摊到多张卡上，每张卡就不需要承担完整的 16 Bytes 开销**，从而在固定总 GPU 数量下训练更大的模型。","> 标准的 `All-Reduce` 操作（让每张卡都得到梯度的总和/平均）通常由两步完成：","存储精度：通常采用 **FP16/BF16（2 Bytes）**；"],"formula":"\\text{Param} \\approx 7 \\times 10^{9} \\times 2\\ \\text{Bytes} \\approx 14\\ \\text{GB} \\tag{13.11}","code":"","goals":["理解「Deepspeed 框架介绍」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-043","moduleId":"training","title":"FastAPI 模型部署实战","level":"进阶","order":44,"concepts":["FastAPI 模型部署实战","一、环境准备","自动交互式 API 文档","路由与参数处理","请求体","DPO","FastAPI"],"structure":["一、环境准备","自动交互式 API 文档","路由与参数处理","请求体","查询参数","路径参数","_main.py"],"body":["在部署机器学习模型时，常见的做法是将其封装成一个可以通过 HTTP 访问的 API 服务。在 Python 社区中有许多优秀的 Web 框架，都能帮助我们构建 API。本节我们以 **FastAPI** 为例，来对此前训练好的命名实体识别模型进行部署。","安装 FastAPI 非常简单。推荐直接安装它的“全家桶”，其中包含了 FastAPI 本身以及运行它所需要的 ASGI 服务器 `uvicorn`。","INFO: Uvicorn running on (Press CTRL+C to quit)","INFO: Started reloader process [95664] using WatchFiles","INFO: Started server process [84940]","**客户端代码生成器**：自动生成用于调用 API 的多种语言（如 TypeScript、Java）的客户端代码。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"pip install \"fastapi[all]\"","goals":["理解「FastAPI 模型部署实战」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-044","moduleId":"training","title":"云服务器模型部署实战","level":"进阶","order":45,"concepts":["云服务器模型部署实战","一、云服务器准备","二、连接云服务器","下载与安装 FinalShell","在 FinalShell 中创建","FastAPI","UX"],"structure":["一、云服务器准备","二、连接云服务器","下载与安装 FinalShell","在 FinalShell 中创建连接","三、uv 项目管理工具","`uv` 的项目配置 (`pyproject.toml`)","四、配置服务器环境"],"body":["在上一节中，我们成功地使用 FastAPI 在本地构建了一个功能完备的 NER 模型 API 服务。不过，这种在个人电脑上运行的开发服务，其主要目的是用于功能验证和调试。要让模型真正发挥价值，我们需要将其部署到云服务器上，使其能够稳定、可靠地对外提供服务。","本节将以**阿里云 ECS（Elastic Compute Service）** 为例，一步步指导你完成从服务器准备、环境配置到应用部署和持久化运行的全过程。在这个过程中，我们将引入一个现代化的高性能 Python 打包工具 **uv**，来替代传统的 `pip` 和 `venv`，体验极速的依赖安装和环境管理。","在部署开始之前，我们需要有一个拥有公网 IP 的云服务器。市面上有许多云服务商可供选择，如阿里云、华为云、Amazon Web Services（AWS）等，它们提供的 **ECS**（弹性计算服务）或 **VPS**（虚拟专用服务器）都可以满足需求。","（1）**密码登录**: 这是最直接的方式，设置一个复杂的密码即可。简单方便，适合初学者和快速测试。","（2）**SSH 密钥对登录**: 这是更安全方式。它会生成一对密钥，**公钥**存放在服务器上，**私钥**（一个 `.pem` 或 `.key` 文件）需要下载并妥善保管在自己的电脑上。连接时，客户端会使用私钥来与服务器上的公钥进行匹配验证，全程无需在网络上传输密码，可以有效防止针对密码的暴力破解攻击。","**22**: 用于 SSH 远程登录。（大部分服务商的默认安全组会放行此端口，以便用户首次连接）"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"# ner_deployment/pyproject.toml [project] name = \"ner-deployment-service\" version = \"1.0.0\" description = \"NER model deployment with FastAPI and uv.\" dependencies = [ \"fastapi\",","goals":["理解「云服务器模型部署实战」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-045","moduleId":"training","title":"使用 Docker Compose 部署模型服务","level":"进阶","order":46,"concepts":["使用 Docker Compos","一、Docker 与 Docke","什么是 Docker？","为何选择 Docker Comp","二、环境准备","Docker","FastAPI"],"structure":["一、Docker 与 Docker Compose","什么是 Docker？","为何选择 Docker Compose？","二、环境准备","云服务器","安装 Docker 和 Docker Compose","ner_deployment/Dockerfile"],"body":["尽管通过 `uv` 高效管理环境，并借助 `Gunicorn` 和 `systemd` 的方式能够成功部署 NER 模型 API，但在团队协作和多环境部署的场景下，它仍可能面临“在我机器上明明是好的”这类环境不一致的挑战。此外，每次部署新项目或迁移服务器时，重复进行环境配置也显得效率不高。","为了追求更高层次的部署自动化与环境一致性，我们将引入容器化技术——**Docker**。本节将学习如何将 NER 应用打包成一个 Docker 镜像，并使用 **Docker Compose** 来定义和运行它。通过这种方式，我们可以将应用及其所有依赖（包括 Python 解释器本身）封装在一个隔离的、标准化的“集装箱”里，实现真正的“一次构建，随处运行”。","对于我们当前的单个 NER API 服务，使用 Docker Compose 也能带来诸多好处。它不仅能实现配置集中化，将所有部署相关的参数（如构建指令、端口映射、重启策略）都写在一个文件中，一目了然。还能大幅简化命令，将冗长的 `docker run` 操作替换为简单的 `docker compose up`，更易于记忆和使用。而且，它还具有良好的扩展性，将来若需增加数据库等新服务，只需要在配置文件中添加几行即可。","服务器的准备工作，包括创建实例、配置安全组放行 **8000 端口**等，与前文介绍的步骤相同。确保我们已拥有一台可以通过 SSH 连接的、配置好安全组的云服务器。","登录到云服务器后，我们需要安装 Docker 环境。在安装之前，同样需要使用 `sudo apt update` 更新一下系统的包索引，保证获取到的是最新的软件列表。","**镜像 (Image)**: 一个只读的模板，用于创建容器。它像一个“安装包”，其中包含了运行应用所需的一切，如代码、一个迷你的操作系统以及所有依赖库。以我们的 NER 项目为例，可以基于一个包含 Python 3.10 的官方镜像，再打包进相关的代码和依赖。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"curl -fsSL -o get-docker.sh sudo sh get-docker.sh","goals":["理解「使用 Docker Compose 部署模型服务」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-046","moduleId":"training","title":"Git 与 GitHub 版本控制基础","level":"进阶","order":47,"concepts":["Git 与 GitHub 版本控","一、DevOps 与 CI/CD","什么是 DevOps？","CI/CD 的核心价值","二、Git 版本控制基础","Docker","UI"],"structure":["一、DevOps 与 CI/CD 概述","什么是 DevOps？","CI/CD 的核心价值","二、Git 版本控制基础","为什么需要版本控制？","Git 的安装与配置","版本迭代与差异对比"],"body":["为了解决这个问题，企业通常会建设一套 **CI/CD（持续集成/持续发布）** 平台。本章我们将介绍如何引入 **Git** 和 **Jenkins**，将开发和运维结合起来，实现代码一经提交，自动触发构建、测试和部署的“智能流水线”。","在了解具体的工具之前，我们需要先理解它背后的核心思想——**DevOps**。DevOps 是 Development（开发）和 Operations（运维）两个词的组合。软件开发模式经历了好几个时代的演进，理解这个过程有助于我们明白为什么现在需要 DevOps。","在计算机发展的早期，软件开发完全依赖程序员的个人能力。没有统一的流程和标准，大家都是“写完就改”（Code and Fix）。这种模式像个手工作坊，高度依赖个人，一旦核心人员离职，项目往往就会陷入混乱，难以维护和扩展。","为了解决混乱，人们借鉴了建筑工程的管理方法，引入了**瀑布模型**。它将开发过程划分为需求、设计、编码、测试、维护等严格的阶段，前一个阶段完成后才能进入下一个阶段。这虽然带来了规范，但过于僵化。就像做一张桌子，如果在最后验收时发现设计图纸一开始就画错了，要修改就必须推倒重来，成本极高。","为了应对需求频繁变更，**敏捷开发**（Agile）出现了。它不再追求一次性交付完美的成品，而是强调**迭代**。先把最核心的功能做出来（比如先做一个能用的桌子腿），给用户看，根据反馈快速调整，再做下一个模块。就像把一个大项目拆成了无数个小周期（Sprint），每个周期都能交付可用的软件，大大提高了灵活性。","**原始时代（个人经验驱动，1950s-1960s）：**"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"# 检查是否已安装 git --version # 如果未安装，使用包管理器安装 # Ubuntu/Debian sudo apt install git # CentOS/RHEL sudo yum install git","goals":["理解「Git 与 GitHub 版本控制基础」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-047","moduleId":"training","title":"搭建 Jenkins CI/CD 自动化部署流水线","level":"进阶","order":48,"concepts":["搭建 Jenkins CI/CD","一、Jenkins 入门与安装部","Jenkins 概览与应用场景","安装 Jenkins 的环境准备","如果尚不存在，先创建存放 key","Docker","FastAPI"],"structure":["一、Jenkins 入门与安装部署","Jenkins 概览与应用场景","安装 Jenkins 的环境准备","如果尚不存在，先创建存放 keyring 的目录","导入 Jenkins 官方 GPG 密钥（写入到 keyring 文件）","写入 Jenkins APT 软件源配置，引用上面的 keyring","首次访问 Jenkins 与插件安装"],"body":["从官网 jenkins.io 定义来看，Jenkins 具备以下特点：","在开始安装 Jenkins 之前，和上一章部署 NER 服务时一样，**先在全新的服务器上更新一次软件源与已安装包**：","这个输出说明当前笔者使用的服务器还没有安装 JDK，如果输出类似 `1.8.0_xxx`，说明系统仍在使用 JDK 8，需要安装 JDK 17：","sudo wget -O /etc/apt/keyrings/jenkins-keyring.asc","echo \"deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] binary/\" | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null","**开源 & 跨平台**：基于 Java 开发，可以运行在主流 Linux 发行版、Windows、macOS 等多种环境；"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"sudo apt update && sudo apt upgrade -y","goals":["理解「搭建 Jenkins CI/CD 自动化部署流水线」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-048","moduleId":"training","title":"大模型训练实践","level":"进阶","order":49,"concepts":["大模型训练流程实践","模型预训练","框架介绍","初始化 LLM","加载定义好的模型参数-此处以 Q","Token","Attention"],"structure":["大模型训练流程实践","模型预训练","框架介绍","初始化 LLM","加载定义好的模型参数-此处以 Qwen-2.5-1.5B 为例","使用 transforemrs 的 Config 类进行加载","下载参数的本地路径"],"body":["第五章中，我们从零开始动手搭建了 LLaMA2 模型，并完整实现了其预训练和微调的全流程。在本章中，我们将深入探讨大模型的训练流程实践，重点介绍如何利用主流的大模型框架高效地进行模型训练和性能优化。","> 阅读建议：在开始本章实践前，建议先阅读 第六章实践说明 和 学习与环境准备。本章正文聚焦 Pretrain、SFT 与 PEFT 三条主线，偏好对齐作为进阶主题在 6.4 节给出整体学习路线，并提供补充专题材料。","在上一章，我们逐步拆解了 LLM 的模型结构及训练过程，从零手写实现了 LLaMA 模型结构及 Pretrain、SFT 全流程，更深入地理解了 LLM 的模型原理及训练细节。但是，在实际应用中，手写实现的 LLM 训练存在以下问题：","因此，在本章中，我们将介绍目前 LLM 领域的主流训练框架 Transformers，并结合分布式框架 deepspeed、高效微调框架 peft 等主流框架，实践使用 transformers 进行模型 Pretrain、SFT 全流程，更好地对接业界的主流 LLM 技术方案。","Transformers 是由 Hugging Face 开发的 NLP 框架，通过模块化设计实现了对 BERT、GPT、LLaMA、T5、ViT 等上百种主流模型架构的统一支持。通过使用 Transformers，开发者无需重复实现基础网络结构，通过 AutoModel 类即可一键加载任意预训练，图6.1 为 Hugging Face Transformers 课程首页：","手写实现 LLM 结构工作量大，难以实时跟进最新模型的结构创新；"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"import os # 设置环境变量，此处使用 HuggingFace 镜像网站 os.environ['HF_ENDPOINT'] = ' # 下载模型 os.system('huggingface-cli download --resume-download Qwen/Qwen2.5-1.5B --local-dir your_local_dir')","goals":["理解「大模型训练实践」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"training-049","moduleId":"training","title":"实践说明","level":"进阶","order":50,"concepts":["实践说明",". 本章包含什么",". 推荐学习顺序",". 代码入口",". 环境建议","Transformer","LoRA"],"structure":[". 本章包含什么",". 推荐学习顺序",". 代码入口",". 环境建议",". 实践建议","先调通路径，再扩大规模","先看懂数据，再启动训练"],"body":["第六章聚焦如何基于 Transformers 生态完成大模型训练实践，正文主线为 Pretrain、SFT 与 PEFT 三部分，适合作为从手写模型实现过渡到工业界训练框架的桥梁章节。","本章脚本中的 `autodl-tmp`、显卡编号、batch size 和输出目录都属于示例配置。建议先把模型路径、数据路径和输出路径替换为本地实际路径，再使用小样本验证流程是否跑通。","无论是 Pretrain 还是 SFT，数据格式都直接决定了训练效果。建议先阅读正文中的数据处理部分，并在运行前打印 1 到 2 条样本进行检查。","第六章正文已经覆盖了核心训练主线。若你希望进一步理解 RLHF、DPO、KTO 与奖励模型，可以在完成正文后继续阅读偏好对齐专题补充，而不必在第一次阅读时一次性掌握所有后训练细节。","`第六章 大模型训练流程实践`：第六章正文，介绍训练框架、数据处理、Trainer、DeepSpeed 与 LoRA/QLoRA 等核心内容。","`6.4 偏好对齐专题补充`：偏好对齐的补充阅读材料，可在完成正文学习后继续深入。"],"formula":"数据 -> 训练/微调 -> 评估 -> 压缩/部署 -> 监控","code":"","goals":["理解「实践说明」在「训练微调与部署」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"rag-050","moduleId":"rag","title":"RAG简介","level":"实战","order":51,"concepts":["RAG 简介","一、什么是 RAG？","核心定义","技术原理","技术演进分类","Embedding","Transformer"],"structure":["RAG 简介","一、什么是 RAG？","核心定义","技术原理","技术演进分类","二、为什么要使用 RAG？","技术选型：RAG vs. 微调"],"body":["> 💡 **一句话总结**：RAG 就是让 LLM 学会了“开卷考试”，它既能利用自己学到的知识，也能随时查阅外部资料。","那么，RAG 系统是如何实现“参数化知识”与“非参数化知识”的结合呢？如图 1-1 所示，其架构主要通过两个阶段来完成这一过程：","RAG 的技术架构经历了从简单到复杂的演进，如图 1-2 大致可分为三个阶段 。","> “离线”指提前完成的数据预处理工作（如索引构建）；“在线”指用户发起请求后的实时处理流程。","在选择具体的技术路径时，一个重要的考量是成本与效益的平衡。通常，我们应优先选择对模型改动最小、成本最低的方案，所以技术选型路径往往遵循的顺序是**提示词工程（Prompt Engineering） -> 检索增强生成 -> 微调（Fine-tuning）**。","**知识向量化**：**嵌入模型（Embedding Model）** 充当了“连接器”的角色。它将外部知识库编码为向量索引（Index），存入**向量数据库**。"],"formula":"加载 -> 清洗 -> 切分 -> 嵌入 -> 索引 -> 召回 -> 重排 -> 生成 -> 评估","code":"","goals":["理解「RAG简介」在「RAG 知识工程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"rag-051","moduleId":"rag","title":"准备工作","level":"实战","order":52,"concepts":["准备工作","一、大模型 API 配置","AIHubmix API 申请","DeepSeek API 申请","二、GitHub Codespa","Token","RAG"],"structure":["一、大模型 API 配置","AIHubmix API 申请","DeepSeek API 申请","二、GitHub Codespaces 环境配置（推荐）","创建Codespaces","python环境配置","三、Cloud Studio 环境配置（国内环境推荐）"],"body":["> 本节环境配置方面主推两种基于浏览器的集成开发环境。不管是手机、平板还是电脑，随时都可以上号运行代码。虽然手机平板可能体验不佳，但胜在能用。","如果已有账号，可以直接登录。如果没有，请点击页面右上角的注册按钮，使用邮箱或手机号完成注册。","注册完成后，来到模型页面。标签选择`免费`，可以看到官方提供了一定数量的免费模型。而且 AIHubmix 还提供了很多嵌入和重排序的国内外模型选择，这些在 RAG 领域都很常用。","接着进入密钥管理页面，如下图所示，默认已经有了一个密钥可以直接复制使用。当然也可以点击 `创建 Key` 填写名称后重新创建一个。","要使用 Deepseek 提供的大语言模型服务，你首先需要一个 API Key。下面是申请步骤：","**访问 AIHubmix 平台**"],"formula":"加载 -> 清洗 -> 切分 -> 嵌入 -> 索引 -> 召回 -> 重排 -> 生成 -> 评估","code":"sudo apt update sudo apt upgrade -y","goals":["理解「准备工作」在「RAG 知识工程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"rag-052","moduleId":"rag","title":"四步构建RAG","level":"实战","order":53,"concepts":["四步构建RAG","一、启动虚拟环境","激活虚拟环境","假设当前在 RAG 课程 项目的","二、运行RAG示例代码","Token","Embedding"],"structure":["一、启动虚拟环境","激活虚拟环境","假设当前在 RAG 课程 项目的根目录下","二、运行RAG示例代码","os.environ['HF_ENDPOINT'] = '","生成集成","四、低代码（基于LlamaIndex）"],"body":["通过第一节的学习，我们对RAG已经有了基本认识，并且也准备好了虚拟环境和api_key，接下来将尝试使用**LangChain**和**LlamaIndex**框架完成第一个RAG应用的实现与运行。通过一个示例，演示如何加载本地Markdown文档，利用嵌入模型处理文本，并结合大型语言模型（LLM）来回答与文档内容相关的问题。","假设已经按照前一章节的指导，创建了名为 `RAG 课程` 的 Conda 虚拟环境。在运行脚本前，先激活虚拟环境：","> 如果使用是Cloud Studio，需要确认当前是否是用户环境，如果不是请运行 `su ubuntu` 切换到用户环境。","每章内容中的代码文件都存放在 `code/Cx` 目录下，其中 `x` 表示章节编号。","Downloading Model from to directory: Path\\to\\RAG 课程\\models\\bge-small-zh-v1.5","**自然界中的羚羊**：刚出生的羚羊通过试错学习站立和奔跑，适应环境。"],"formula":"加载 -> 清洗 -> 切分 -> 嵌入 -> 索引 -> 召回 -> 重排 -> 生成 -> 评估","code":"conda activate RAG 课程","goals":["理解「四步构建RAG」在「RAG 知识工程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"rag-053","moduleId":"rag","title":"附：Python虚拟环境部署方案补充","level":"实战","order":54,"concepts":["附","uv 环境管理","Windows 系统","Linux / MacOS 系统","创建并激活虚拟环境","RAG","UX"],"structure":["uv 环境管理","Windows 系统","Linux / MacOS 系统","创建并激活虚拟环境","**创建虚拟环境**"],"body":["本项目由于涉及到的包过多，并且**依赖问题**自始至终都是Python的老大难问题，这就造成了 Python 工程化方面生态非常割裂。","对于这种问题，uv提供了统一的虚拟环境管理入口，同时吸收了 Rust 语言先进的包管理经验，使用它可以减少我们在 Python 工程方面折腾的时间，下面我们使用uv来安装项目的虚拟环境。","$env:Path = \"C:\\Users\\michaelbradley\\.local\\bin;$env:Path\"","PS C:\\Users\\parallel> uv venv rag --python 3.12.7","Creating virtual environment at: rag"],"formula":"加载 -> 清洗 -> 切分 -> 嵌入 -> 索引 -> 召回 -> 重排 -> 生成 -> 评估","code":"powershell -ExecutionPolicy ByPass -c \"irm | iex\"","goals":["理解「附：Python虚拟环境部署方案补充」在「RAG 知识工程」主线中的作用。","能复述本章关键流程，并说明输入、处理、输出与评估方式。","能把本章知识落到一个可验证的小实验或产品功能中。"],"practice":["把本章小节整理成一张流程图或表格。","选一个真实场景，写出输入、约束、输出和失败处理。","用 5 个问题自测：概念、流程、边界、指标、工程落地。"]},{"id":"rag-054","moduleId":"rag","title":"数据加载","level":"实战","order":55,"concepts
